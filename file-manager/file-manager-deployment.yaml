apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-manager
  namespace: user-space-${USERNAME}
  labels:
    app: file-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-manager
  template:
    metadata:
      labels:
        app: file-manager
    spec:
      containers:
        - name: file-manager
          image: packalares/file-manager:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DATA_PATH
              value: /packalares/data
            - name: UPLOAD_MAX_SIZE
              value: "10G"
            - name: LISTEN_ADDR
              value: ":8080"
          volumeMounts:
            - name: data
              mountPath: /packalares/data
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            privileged: true          # required for mount syscalls (SMB/NFS)
            capabilities:
              add:
                - SYS_ADMIN
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: data
          hostPath:
            path: /packalares/data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: files-svc
  namespace: user-space-${USERNAME}
  labels:
    app: file-manager
spec:
  selector:
    app: file-manager
  ports:
    - port: 80
      targetPort: 8080
      name: http
  type: ClusterIP
