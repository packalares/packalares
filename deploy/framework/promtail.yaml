# Promtail — collects logs from all pods and ships to Loki
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: {{MONITORING_NAMESPACE}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
- apiGroups: [""]
  resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
- kind: ServiceAccount
  name: promtail
  namespace: {{MONITORING_NAMESPACE}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: {{MONITORING_NAMESPACE}}
data:
  promtail.yaml: |
    server:
      http_listen_port: 3101
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://loki-svc.{{MONITORING_NAMESPACE}}:3100/loki/api/v1/push
    scrape_configs:
      - job_name: pods
        static_configs:
          - targets: [localhost]
            labels:
              job: pods
              __path__: /var/log/pods/**/*.log
        pipeline_stages:
          - regex:
              expression: /var/log/pods/(?P<namespace>[^_]+)_(?P<pod>[^_]+)_[^/]+/(?P<container>[^/]+)/.*\.log
          - labels:
              namespace:
              pod:
              container:
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: {{MONITORING_NAMESPACE}}
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      tolerations:
      - operator: Exists
      containers:
      - name: promtail
        image: ghcr.io/packalares/promtail:2.9.4
        args:
        - -config.file=/etc/promtail/promtail.yaml
        ports:
        - containerPort: 3101
        volumeMounts:
        - name: config
          mountPath: /etc/promtail
        - name: pods-logs
          mountPath: /var/log/pods
          readOnly: true
        - name: containers-logs
          mountPath: /var/lib/docker/containers
          readOnly: true
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 128Mi
      volumes:
      - name: config
        configMap:
          name: promtail-config
      - name: pods-logs
        hostPath:
          path: /var/log/pods
      - name: containers-logs
        hostPath:
          path: /var/lib/docker/containers
