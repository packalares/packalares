apiVersion: apps/v1
kind: Deployment
metadata:
  name: kvrocks
  namespace: os-system
  labels:
    app: kvrocks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kvrocks
  template:
    metadata:
      labels:
        app: kvrocks
    spec:
      containers:
      - name: kvrocks
        image: apache/kvrocks:2.15.0
        ports:
        - containerPort: 6666
        command: ["kvrocks"]
        args:
        - --bind
        - "0.0.0.0"
        - --port
        - "6666"
        - --dir
        - /data
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: data
        hostPath:
          path: /var/lib/packalares/kvrocks-data
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: kvrocks-svc
  namespace: os-system
spec:
  selector:
    app: kvrocks
  ports:
  - port: 6379
    targetPort: 6666
