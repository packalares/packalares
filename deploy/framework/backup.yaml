---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-service
  namespace: os-system
  labels:
    app: backup-service
    tier: framework
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backup-service
  template:
    metadata:
      labels:
        app: backup-service
    spec:
      serviceAccountName: backup-service
      containers:
      - name: backup-service
        image: ${REGISTRY:-docker.io}/beclab/backup-service:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: ETCD_ENDPOINTS
          value: "https://127.0.0.1:2379"
        - name: ETCD_CA_FILE
          value: "/etc/ssl/etcd/ssl/ca.pem"
        - name: ETCD_CERT_FILE
          value: "/etc/ssl/etcd/ssl/server.pem"
        - name: ETCD_KEY_FILE
          value: "/etc/ssl/etcd/ssl/server-key.pem"
        - name: BACKUP_DIR
          value: "/backup"
        volumeMounts:
        - name: etcd-certs
          mountPath: /etc/ssl/etcd/ssl
          readOnly: true
        - name: backup-data
          mountPath: /backup
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: etcd-certs
        hostPath:
          path: /etc/ssl/etcd/ssl
          type: Directory
      - name: backup-data
        hostPath:
          path: /var/lib/packalares/backups
          type: DirectoryOrCreate
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-service
  namespace: os-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backup-service-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: backup-service
  namespace: os-system
---
apiVersion: v1
kind: Service
metadata:
  name: backup-service-svc
  namespace: os-system
spec:
  selector:
    app: backup-service
  ports:
  - port: 8080
    targetPort: 8080
