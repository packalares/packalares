apiVersion: v1
kind: ServiceAccount
metadata:
  name: bfl
  namespace: "{{ .Namespace }}"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: packalares-bfl
rules:
  - apiGroups: ["iam.kubesphere.io"]
    resources: ["users", "globalrolebindings"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["app.bytetrade.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: packalares-bfl
subjects:
  - kind: ServiceAccount
    name: bfl
    namespace: "{{ .Namespace }}"
roleRef:
  kind: ClusterRole
  name: packalares-bfl
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bfl
  namespace: "{{ .Namespace }}"
  labels:
    app: bfl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bfl
  template:
    metadata:
      labels:
        app: bfl
    spec:
      serviceAccountName: bfl
      priorityClassName: system-cluster-critical
      containers:
        - name: bfl
          image: ghcr.io/packalares/bfl:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: BFL_LISTEN_ADDR
              value: ":8080"
            - name: OWNER
              value: "{{ .Username }}"
            - name: BFL_NAMESPACE
              value: "{{ .Namespace }}"
            - name: OLARES_DOMAIN
              value: "{{ .Domain }}"
            - name: OLARES_LOCAL_DOMAIN
              value: "{{ .LocalDomain }}"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: bfl
  namespace: "{{ .Namespace }}"
  labels:
    app: bfl
spec:
  selector:
    app: bfl
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
  type: ClusterIP
