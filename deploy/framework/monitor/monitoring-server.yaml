---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitoring-server
  namespace: {{FRAMEWORK_NAMESPACE}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: monitoring-server
rules:
- apiGroups: [""]
  resources: ["pods", "nodes", "namespaces"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "daemonsets", "statefulsets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: monitoring-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: monitoring-server
subjects:
- kind: ServiceAccount
  name: monitoring-server
  namespace: {{FRAMEWORK_NAMESPACE}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-server
  namespace: {{FRAMEWORK_NAMESPACE}}
  labels:
    app: monitoring-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoring-server
  template:
    metadata:
      labels:
        app: monitoring-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: monitoring-server
      initContainers:
      - name: wait-for-tapr
        image: ghcr.io/packalares/busybox:1.36
        command:
          - sh
          - -c
          - >-
            echo "Waiting for tapr ...";
            until wget -q -O- http://tapr-svc.{{PLATFORM_NAMESPACE}}:8080/healthz 2>/dev/null | grep -q ok; do
              sleep 2; printf ".";
            done;
            echo " tapr is ready";
      containers:
      - name: monitoring-server
        image: ghcr.io/packalares/monitor:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: TAPR_URL
          value: "http://tapr-svc.{{PLATFORM_NAMESPACE}}:8080"
        - name: TAPR_AUTH_TOKEN
          value: "{{TAPR_AUTH_TOKEN}}"
        - name: REDIS_PASSWORD
          value: "{{REDIS_PASSWORD}}"
        - name: PROMETHEUS_URL
          value: "http://prometheus-svc.{{MONITORING_NAMESPACE}}:9090"
        - name: PORT
          value: "8000"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 500m
            memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: monitoring-server
  namespace: {{FRAMEWORK_NAMESPACE}}
spec:
  selector:
    app: monitoring-server
  type: ClusterIP
  ports:
  - protocol: TCP
    name: http
    port: 80
    targetPort: 8000
