name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-cli:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          CLI_VERSION=$(cat VERSION)
          if [ -z "$CLI_VERSION" ]; then echo "Error: VERSION file is empty"; exit 1; fi
          echo "Building CLI with version: $CLI_VERSION"
          cd cli
          go build -ldflags="-s -w -X github.com/beclab/Olares/cli/version.VERSION=$CLI_VERSION" -o ../olares-cli-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: olares-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: olares-cli-${{ matrix.goos }}-${{ matrix.goarch }}

  build-olaresd:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libpcap-dev

      - name: Build olaresd
        env:
          CGO_ENABLED: '1'
        run: |
          CLI_VERSION=$(cat VERSION)
          cd daemon
          go build -ldflags="-s -w -X github.com/beclab/Olares/daemon/cmd/terminusd/version.version=$CLI_VERSION" -o ../olaresd-linux-amd64 cmd/terminusd/main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: olaresd-linux-amd64
          path: olaresd-linux-amd64

  build-wizard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build CLI for wizard generation
        run: |
          CLI_VERSION=$(cat VERSION)
          cd cli
          go build -ldflags="-s -w -X github.com/beclab/Olares/cli/version.VERSION=$CLI_VERSION" -o ../olares-cli ./cmd/main.go
          chmod +x ../olares-cli

      - name: Build wizard tarball
        run: |
          CLI_VERSION=$(cat VERSION)
          export PATH="$(pwd):$PATH"
          olares-cli release --version "$CLI_VERSION" --ignore-missing-images
          mv install-wizard-v${CLI_VERSION}.tar.gz install-wizard.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: install-wizard
          path: install-wizard.tar.gz

  release:
    needs: [build-cli, build-olaresd, build-wizard]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'latest' }}
          name: ${{ github.ref_name || 'latest' }}
          files: |
            olares-cli-linux-amd64/olares-cli-linux-amd64
            olares-cli-linux-arm64/olares-cli-linux-arm64
            olaresd-linux-amd64/olaresd-linux-amd64
            install-wizard/install-wizard.tar.gz
          make_latest: true
