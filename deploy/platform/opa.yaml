---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
  namespace: os-system
  labels:
    app: opa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opa
  template:
    metadata:
      labels:
        app: opa
    spec:
      containers:
      - name: opa
        image: ${REGISTRY:-docker.io}/openpolicyagent/opa:0.62.1
        ports:
        - containerPort: 8181
          name: http
        args: ["run", "--server", "--log-level=info", "--set=decision_logs.console=true"]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8181
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8181
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: opa-svc
  namespace: os-system
spec:
  selector:
    app: opa
  ports:
  - port: 8181
    targetPort: 8181
