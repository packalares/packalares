<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packalares - Files</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg-surface: #111;
  --bg-card: #141414;
  --bg-hover: #1a1a1a;
  --bg-selected: rgba(59,130,246,0.12);
  --border: #222;
  --border-light: #2a2a2a;
  --text: #e0e0e0;
  --text-muted: #888;
  --text-dim: #555;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --danger: #ef4444;
  --success: #22c55e;
  --warning: #f59e0b;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.2s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 220px;
  height: 100vh;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  height: 48px;
}

.sidebar-header button {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  border-radius: 4px;
  display: flex;
  transition: color var(--transition);
}

.sidebar-header button:hover { color: var(--text); }
.sidebar-header button svg { width: 16px; height: 16px; }

.sidebar-header h1 {
  font-size: 14px;
  font-weight: 600;
  flex: 1;
}

.sidebar-section {
  padding: 12px 0;
}

.sidebar-section-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  padding: 0 16px 8px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
  border-left: 2px solid transparent;
}

.sidebar-item:hover {
  background: var(--bg-hover);
  color: var(--text);
}

.sidebar-item.active {
  background: var(--bg-selected);
  color: var(--accent);
  border-left-color: var(--accent);
}

.sidebar-item svg {
  width: 15px;
  height: 15px;
  flex-shrink: 0;
}

.sidebar-item .size {
  margin-left: auto;
  font-size: 10px;
  color: var(--text-dim);
}

.sidebar-storage {
  margin-top: auto;
  padding: 16px;
  border-top: 1px solid var(--border);
}

.storage-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 6px;
}

.storage-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.5s ease;
}

.storage-text {
  font-size: 10px;
  color: var(--text-dim);
}

/* Main */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Toolbar */
.toolbar {
  height: 48px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  flex-shrink: 0;
}

.toolbar-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 6px;
  border-radius: 4px;
  display: flex;
  transition: background var(--transition), color var(--transition);
}

.toolbar-btn:hover { background: var(--bg-hover); color: var(--text); }
.toolbar-btn:disabled { opacity: 0.3; cursor: default; }
.toolbar-btn:disabled:hover { background: none; }
.toolbar-btn svg { width: 16px; height: 16px; }

.toolbar-separator {
  width: 1px;
  height: 20px;
  background: var(--border);
}

/* Breadcrumb */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 2px;
  flex: 1;
  overflow: hidden;
  min-width: 0;
}

.breadcrumb-item {
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 4px;
  white-space: nowrap;
  transition: background var(--transition), color var(--transition);
}

.breadcrumb-item:hover {
  background: var(--bg-hover);
  color: var(--text);
}

.breadcrumb-item.current {
  color: var(--text);
  font-weight: 500;
}

.breadcrumb-sep {
  color: var(--text-dim);
  font-size: 12px;
  flex-shrink: 0;
}

.toolbar-search {
  width: 200px;
  height: 28px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0 8px;
  color: var(--text);
  font-size: 11px;
  transition: border-color var(--transition);
}

.toolbar-search:focus {
  outline: none;
  border-color: var(--accent);
}

/* File List */
.file-list-container {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.file-list-header {
  display: grid;
  grid-template-columns: 40px 1fr 100px 140px 80px;
  gap: 8px;
  padding: 8px 16px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  position: sticky;
  top: 0;
  z-index: 10;
  cursor: pointer;
  user-select: none;
}

.file-list-header > div {
  display: flex;
  align-items: center;
  gap: 4px;
}

.file-list-header > div:hover {
  color: var(--text-muted);
}

.sort-indicator {
  font-size: 9px;
  opacity: 0.5;
}

.file-list {
  flex: 1;
  overflow-y: auto;
}

.file-row {
  display: grid;
  grid-template-columns: 40px 1fr 100px 140px 80px;
  gap: 8px;
  padding: 6px 16px;
  align-items: center;
  cursor: pointer;
  transition: background var(--transition);
  border-bottom: 1px solid rgba(255,255,255,0.02);
}

.file-row:hover {
  background: var(--bg-hover);
}

.file-row.selected {
  background: var(--bg-selected);
}

.file-row.drag-over {
  background: rgba(59,130,246,0.15);
  outline: 2px dashed var(--accent);
  outline-offset: -2px;
}

.file-icon {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.file-icon svg {
  width: 22px;
  height: 22px;
}

.file-icon.folder svg { color: #f59e0b; }
.file-icon.image svg { color: #ec4899; }
.file-icon.video svg { color: #8b5cf6; }
.file-icon.audio svg { color: #06b6d4; }
.file-icon.document svg { color: #3b82f6; }
.file-icon.archive svg { color: #f97316; }
.file-icon.code svg { color: #22c55e; }
.file-icon.file svg { color: var(--text-dim); }

.file-name {
  font-size: 13px;
  font-weight: 400;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-size {
  font-size: 12px;
  color: var(--text-muted);
}

.file-date {
  font-size: 12px;
  color: var(--text-muted);
}

.file-type {
  font-size: 11px;
  color: var(--text-dim);
}

/* Grid View */
.file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
  padding: 16px;
}

.file-grid-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 8px;
  border-radius: 8px;
  cursor: pointer;
  transition: background var(--transition);
}

.file-grid-item:hover {
  background: var(--bg-hover);
}

.file-grid-item.selected {
  background: var(--bg-selected);
}

.file-grid-icon {
  width: 56px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 8px;
}

.file-grid-icon svg {
  width: 40px;
  height: 40px;
}

.file-grid-icon.folder svg { color: #f59e0b; }
.file-grid-icon.image svg { color: #ec4899; }
.file-grid-icon.file svg { color: var(--text-dim); }

.file-grid-name {
  font-size: 11px;
  text-align: center;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Context Menu */
.context-menu {
  position: fixed;
  z-index: 2000;
  background: rgba(30,30,30,0.95);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 4px;
  min-width: 200px;
  display: none;
  box-shadow: var(--shadow);
}

.context-menu.visible {
  display: block;
  animation: menuIn 0.12s ease-out;
}

@keyframes menuIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

.ctx-item {
  padding: 7px 12px;
  font-size: 12px;
  color: var(--text);
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: background 0.1s;
}

.ctx-item:hover { background: rgba(59,130,246,0.2); }
.ctx-item.danger { color: var(--danger); }
.ctx-item.danger:hover { background: rgba(239,68,68,0.1); }

.ctx-item svg { width: 14px; height: 14px; color: var(--text-muted); }
.ctx-item.danger svg { color: var(--danger); }

.ctx-item .shortcut {
  margin-left: auto;
  font-size: 10px;
  color: var(--text-dim);
}

.ctx-separator {
  height: 1px;
  background: rgba(255,255,255,0.06);
  margin: 4px 0;
}

/* Upload Overlay */
.upload-overlay {
  position: fixed;
  inset: 0;
  z-index: 1500;
  background: rgba(59,130,246,0.1);
  border: 3px dashed var(--accent);
  display: none;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.upload-overlay.visible {
  display: flex;
}

.upload-overlay-text {
  font-size: 20px;
  font-weight: 600;
  color: var(--accent);
  background: rgba(10,10,10,0.8);
  padding: 20px 40px;
  border-radius: 12px;
}

/* Upload Progress */
.upload-progress {
  position: fixed;
  bottom: 16px;
  right: 16px;
  width: 320px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  z-index: 1000;
  display: none;
  box-shadow: var(--shadow);
}

.upload-progress.visible {
  display: block;
  animation: slideUp 0.2s ease-out;
}

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.upload-progress-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.upload-progress-title {
  font-size: 13px;
  font-weight: 500;
}

.upload-progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 8px;
}

.upload-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s ease;
  width: 0%;
}

.upload-progress-info {
  font-size: 11px;
  color: var(--text-muted);
}

/* Preview Panel */
.preview-panel {
  width: 300px;
  height: 100%;
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
  flex-shrink: 0;
  display: none;
  flex-direction: column;
}

.preview-panel.visible {
  display: flex;
}

.preview-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.preview-header h3 {
  font-size: 13px;
  font-weight: 500;
}

.preview-close {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  border-radius: 4px;
}

.preview-close:hover { color: var(--text); }
.preview-close svg { width: 14px; height: 14px; }

.preview-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.preview-thumb {
  width: 100%;
  aspect-ratio: 16/10;
  background: var(--bg-hover);
  border-radius: 8px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.preview-thumb img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

.preview-thumb svg {
  width: 48px;
  height: 48px;
  color: var(--text-dim);
}

.preview-info-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 12px;
}

.preview-info-label { color: var(--text-muted); }
.preview-info-value { color: var(--text); font-weight: 500; }

/* Status Bar */
.statusbar {
  height: 28px;
  background: var(--bg-surface);
  border-top: 1px solid var(--border);
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 11px;
  color: var(--text-dim);
  flex-shrink: 0;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(40px);
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 12px;
  z-index: 3000;
  transition: transform 0.3s ease;
}

.toast.visible {
  transform: translateX(-50%) translateY(0);
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* Rename input */
.rename-input {
  background: var(--bg-hover);
  border: 1px solid var(--accent);
  border-radius: 4px;
  color: var(--text);
  font-size: 13px;
  padding: 2px 6px;
  outline: none;
  width: 100%;
}

/* New folder dialog */
.dialog-overlay {
  position: fixed;
  inset: 0;
  z-index: 2500;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
}

.dialog-overlay.visible {
  display: flex;
}

.dialog {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  width: 360px;
  box-shadow: var(--shadow);
}

.dialog h3 {
  font-size: 16px;
  margin-bottom: 16px;
}

.dialog input {
  width: 100%;
  height: 36px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0 12px;
  color: var(--text);
  font-size: 13px;
  margin-bottom: 16px;
}

.dialog input:focus {
  outline: none;
  border-color: var(--accent);
}

.dialog-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.dialog-btn {
  padding: 8px 20px;
  font-size: 13px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background var(--transition);
}

.dialog-btn.primary {
  background: var(--accent);
  color: #fff;
}

.dialog-btn.primary:hover { background: var(--accent-hover); }

.dialog-btn.cancel {
  background: var(--bg-hover);
  color: var(--text);
}

.dialog-btn.cancel:hover { background: var(--border); }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <button onclick="window.history.back()" title="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h1>Files</h1>
    <button title="New Folder" id="newFolderBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
    </button>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-title">Quick Access</div>
    <div class="sidebar-item active" data-path="/Home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      Home
    </div>
    <div class="sidebar-item" data-path="/Documents">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Documents
    </div>
    <div class="sidebar-item" data-path="/Downloads">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Downloads
    </div>
    <div class="sidebar-item" data-path="/Pictures">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Pictures
    </div>
    <div class="sidebar-item" data-path="/Videos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      Videos
    </div>
    <div class="sidebar-item" data-path="/Music">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      Music
    </div>
  </div>

  <div class="sidebar-section" id="mountsSection">
    <div class="sidebar-section-title">Mounts</div>
  </div>

  <div class="sidebar-storage">
    <div class="storage-bar">
      <div class="storage-bar-fill" id="storageBarFill" style="width:0%"></div>
    </div>
    <div class="storage-text" id="storageText">Loading...</div>
  </div>
</div>

<!-- Main Content -->
<div class="main">
  <!-- Toolbar -->
  <div class="toolbar">
    <button class="toolbar-btn" id="backBtn" title="Back" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="toolbar-btn" id="forwardBtn" title="Forward" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="toolbar-btn" id="upBtn" title="Go Up">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
    </button>
    <button class="toolbar-btn" id="refreshBtn" title="Refresh">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15A9 9 0 115.64 5.64L1 10"/></svg>
    </button>

    <div class="toolbar-separator"></div>

    <div class="breadcrumb" id="breadcrumb"></div>

    <div class="toolbar-separator"></div>

    <input type="text" class="toolbar-search" id="fileSearch" placeholder="Search files..." />

    <button class="toolbar-btn" id="viewToggleBtn" title="Toggle View">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </button>

    <button class="toolbar-btn" id="uploadBtn" title="Upload File">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </button>
  </div>

  <!-- File List -->
  <div class="file-list-container" id="fileListContainer">
    <div class="file-list-header" id="fileListHeader">
      <div></div>
      <div data-sort="name">Name <span class="sort-indicator" id="sortName">&#9650;</span></div>
      <div data-sort="size">Size <span class="sort-indicator" id="sortSize"></span></div>
      <div data-sort="modified">Modified <span class="sort-indicator" id="sortModified"></span></div>
      <div data-sort="type">Type</div>
    </div>
    <div class="file-list" id="fileList"></div>
    <div class="file-grid" id="fileGrid" style="display:none;flex:1;overflow-y:auto;"></div>
  </div>

  <!-- Status Bar -->
  <div class="statusbar" id="statusbar">
    <span id="itemCount">0 items</span>
    <span id="selectedCount"></span>
  </div>
</div>

<!-- Preview Panel -->
<div class="preview-panel" id="previewPanel">
  <div class="preview-header">
    <h3 id="previewTitle">Preview</h3>
    <button class="preview-close" id="previewClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="preview-content" id="previewContent"></div>
</div>

<!-- Context Menu -->
<div class="context-menu" id="contextMenu">
  <div class="ctx-item" data-action="open"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg> Open <span class="shortcut">Enter</span></div>
  <div class="ctx-item" data-action="download"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download</div>
  <div class="ctx-separator"></div>
  <div class="ctx-item" data-action="rename"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Rename <span class="shortcut">F2</span></div>
  <div class="ctx-item" data-action="copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy <span class="shortcut">Ctrl+C</span></div>
  <div class="ctx-item" data-action="move"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg> Move</div>
  <div class="ctx-separator"></div>
  <div class="ctx-item" data-action="share"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Share</div>
  <div class="ctx-separator"></div>
  <div class="ctx-item danger" data-action="delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg> Delete <span class="shortcut">Del</span></div>
</div>

<!-- Upload Overlay -->
<div class="upload-overlay" id="uploadOverlay">
  <div class="upload-overlay-text">Drop files here to upload</div>
</div>

<!-- Upload Progress -->
<div class="upload-progress" id="uploadProgress">
  <div class="upload-progress-header">
    <span class="upload-progress-title" id="uploadProgressTitle">Uploading...</span>
  </div>
  <div class="upload-progress-bar">
    <div class="upload-progress-fill" id="uploadProgressFill"></div>
  </div>
  <div class="upload-progress-info" id="uploadProgressInfo"></div>
</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" multiple style="display:none" />

<!-- New Folder Dialog -->
<div class="dialog-overlay" id="newFolderDialog">
  <div class="dialog">
    <h3>New Folder</h3>
    <input type="text" id="newFolderName" placeholder="Folder name" />
    <div class="dialog-actions">
      <button class="dialog-btn cancel" id="newFolderCancel">Cancel</button>
      <button class="dialog-btn primary" id="newFolderCreate">Create</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // --- State ---
  const state = {
    currentPath: '/Home',
    files: [],
    history: ['/Home'],
    historyIndex: 0,
    selected: new Set(),
    lastSelected: -1,
    viewMode: 'list', // 'list' or 'grid'
    sortBy: 'name',
    sortAsc: true,
    clipboard: { files: [], action: null }, // action: 'copy' | 'move'
    contextFile: null,
    searchQuery: ''
  };

  // --- DOM ---
  const $ = id => document.getElementById(id);
  const fileList = $('fileList');
  const fileGrid = $('fileGrid');
  const breadcrumb = $('breadcrumb');
  const contextMenu = $('contextMenu');
  const uploadOverlay = $('uploadOverlay');
  const previewPanel = $('previewPanel');
  const toast = $('toast');

  // --- Toast ---
  function showToast(msg, duration = 3000) {
    toast.textContent = msg;
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), duration);
  }

  // --- File type detection ---
  function getFileType(name, isDir) {
    if (isDir) return 'folder';
    const ext = name.split('.').pop().toLowerCase();
    const types = {
      image: ['jpg', 'jpeg', 'png', 'gif', 'svg', 'webp', 'bmp', 'ico'],
      video: ['mp4', 'mkv', 'avi', 'mov', 'webm', 'flv'],
      audio: ['mp3', 'wav', 'flac', 'ogg', 'aac', 'm4a'],
      document: ['pdf', 'doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx', 'txt', 'md', 'csv'],
      archive: ['zip', 'tar', 'gz', 'bz2', 'rar', '7z', 'xz'],
      code: ['js', 'ts', 'py', 'go', 'rs', 'java', 'c', 'cpp', 'h', 'html', 'css', 'json', 'yaml', 'yml', 'toml', 'sh', 'bash']
    };
    for (const [type, exts] of Object.entries(types)) {
      if (exts.includes(ext)) return type;
    }
    return 'file';
  }

  function getFileIcon(type) {
    const icons = {
      folder: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>',
      image: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>',
      video: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>',
      audio: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>',
      document: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
      archive: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>',
      code: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>',
      file: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>'
    };
    return icons[type] || icons.file;
  }

  function formatSize(bytes) {
    if (bytes === 0 || bytes === undefined) return '--';
    const units = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(bytes) / Math.log(1024));
    return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
  }

  function formatDate(dateStr) {
    if (!dateStr) return '--';
    const d = new Date(dateStr);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  // --- API ---
  async function loadFiles(path) {
    try {
      const res = await fetch('/api/resources' + path, {
        headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        const data = await res.json();
        state.files = Array.isArray(data) ? data : (data.items || data.files || []);
      } else {
        throw new Error(`HTTP ${res.status}`);
      }
    } catch (e) {
      console.warn('Failed to load files, using demo data:', e.message);
      // Demo data fallback
      state.files = generateDemoFiles(path);
    }

    state.selected.clear();
    state.lastSelected = -1;
    render();
    updateStatusBar();
  }

  function generateDemoFiles(path) {
    const common = [
      { name: 'Documents', isDir: true, size: 0, modified: '2026-03-20T10:00:00Z' },
      { name: 'Downloads', isDir: true, size: 0, modified: '2026-03-19T15:30:00Z' },
      { name: 'Pictures', isDir: true, size: 0, modified: '2026-03-18T09:00:00Z' },
      { name: 'Videos', isDir: true, size: 0, modified: '2026-03-17T14:00:00Z' },
      { name: 'Music', isDir: true, size: 0, modified: '2026-03-16T11:00:00Z' },
      { name: 'notes.md', isDir: false, size: 2048, modified: '2026-03-20T12:00:00Z' },
      { name: 'config.yaml', isDir: false, size: 512, modified: '2026-03-19T08:00:00Z' },
      { name: 'photo.jpg', isDir: false, size: 3145728, modified: '2026-03-18T16:00:00Z' },
      { name: 'backup.tar.gz', isDir: false, size: 52428800, modified: '2026-03-15T20:00:00Z' },
      { name: 'script.sh', isDir: false, size: 1024, modified: '2026-03-14T10:00:00Z' },
      { name: 'report.pdf', isDir: false, size: 1048576, modified: '2026-03-13T09:00:00Z' },
    ];
    return common;
  }

  async function loadMounts() {
    try {
      const res = await fetch('/api/mounts');
      if (res.ok) {
        const mounts = await res.json();
        renderMounts(mounts);
      }
    } catch (e) {
      console.warn('Mounts API not available');
    }
  }

  async function loadStorageInfo() {
    try {
      const res = await fetch('/api/metrics');
      if (res.ok) {
        const data = await res.json();
        const disk = data.disk || data.storage;
        if (disk) {
          const pct = disk.usedPercent || (disk.used / disk.total * 100) || 0;
          $('storageBarFill').style.width = pct + '%';
          $('storageText').textContent = `${formatSize(disk.used)} of ${formatSize(disk.total)} used`;
        }
      }
    } catch (e) {
      $('storageText').textContent = 'Storage info unavailable';
    }
  }

  function renderMounts(mounts) {
    const section = $('mountsSection');
    const existing = section.querySelectorAll('.sidebar-item');
    existing.forEach(el => el.remove());

    (Array.isArray(mounts) ? mounts : []).forEach(mount => {
      const el = document.createElement('div');
      el.className = 'sidebar-item';
      el.dataset.path = mount.path || mount.mountPoint || '/mnt/' + mount.name;
      el.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
        ${mount.name || mount.device || 'Mount'}
      `;
      el.addEventListener('click', () => navigateTo(el.dataset.path));
      section.appendChild(el);
    });
  }

  // --- Navigation ---
  function navigateTo(path) {
    state.currentPath = path;
    // Add to history
    state.history = state.history.slice(0, state.historyIndex + 1);
    state.history.push(path);
    state.historyIndex = state.history.length - 1;

    updateNavButtons();
    updateSidebarActive();
    loadFiles(path);
    renderBreadcrumb();
  }

  function goBack() {
    if (state.historyIndex > 0) {
      state.historyIndex--;
      state.currentPath = state.history[state.historyIndex];
      updateNavButtons();
      updateSidebarActive();
      loadFiles(state.currentPath);
      renderBreadcrumb();
    }
  }

  function goForward() {
    if (state.historyIndex < state.history.length - 1) {
      state.historyIndex++;
      state.currentPath = state.history[state.historyIndex];
      updateNavButtons();
      updateSidebarActive();
      loadFiles(state.currentPath);
      renderBreadcrumb();
    }
  }

  function goUp() {
    const parts = state.currentPath.split('/').filter(Boolean);
    if (parts.length > 1) {
      parts.pop();
      navigateTo('/' + parts.join('/'));
    } else {
      navigateTo('/');
    }
  }

  function updateNavButtons() {
    $('backBtn').disabled = state.historyIndex <= 0;
    $('forwardBtn').disabled = state.historyIndex >= state.history.length - 1;
  }

  function updateSidebarActive() {
    document.querySelectorAll('.sidebar-item').forEach(el => {
      el.classList.toggle('active', el.dataset.path === state.currentPath);
    });
  }

  // --- Render ---
  function renderBreadcrumb() {
    const parts = state.currentPath.split('/').filter(Boolean);
    breadcrumb.innerHTML = '';

    const rootEl = document.createElement('span');
    rootEl.className = 'breadcrumb-item' + (parts.length === 0 ? ' current' : '');
    rootEl.textContent = '/';
    rootEl.addEventListener('click', () => navigateTo('/'));
    breadcrumb.appendChild(rootEl);

    parts.forEach((part, i) => {
      const sep = document.createElement('span');
      sep.className = 'breadcrumb-sep';
      sep.textContent = '/';
      breadcrumb.appendChild(sep);

      const el = document.createElement('span');
      el.className = 'breadcrumb-item' + (i === parts.length - 1 ? ' current' : '');
      el.textContent = part;
      const path = '/' + parts.slice(0, i + 1).join('/');
      el.addEventListener('click', () => navigateTo(path));
      breadcrumb.appendChild(el);
    });
  }

  function getSortedFiles() {
    let files = [...state.files];
    const q = state.searchQuery.toLowerCase();
    if (q) {
      files = files.filter(f => f.name.toLowerCase().includes(q));
    }

    files.sort((a, b) => {
      // Folders first
      if (a.isDir && !b.isDir) return -1;
      if (!a.isDir && b.isDir) return 1;

      let cmp = 0;
      switch (state.sortBy) {
        case 'name': cmp = a.name.localeCompare(b.name); break;
        case 'size': cmp = (a.size || 0) - (b.size || 0); break;
        case 'modified': cmp = new Date(a.modified || 0) - new Date(b.modified || 0); break;
        default: cmp = a.name.localeCompare(b.name);
      }
      return state.sortAsc ? cmp : -cmp;
    });

    return files;
  }

  function render() {
    if (state.viewMode === 'list') {
      renderListView();
      fileList.style.display = '';
      fileGrid.style.display = 'none';
      $('fileListHeader').style.display = '';
    } else {
      renderGridView();
      fileList.style.display = 'none';
      fileGrid.style.display = '';
      $('fileListHeader').style.display = 'none';
    }
  }

  function renderListView() {
    const files = getSortedFiles();
    fileList.innerHTML = '';

    if (files.length === 0) {
      fileList.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);font-size:13px;">This folder is empty</div>';
      return;
    }

    files.forEach((file, index) => {
      const type = getFileType(file.name, file.isDir);
      const row = document.createElement('div');
      row.className = 'file-row' + (state.selected.has(index) ? ' selected' : '');
      row.dataset.index = index;
      row.innerHTML = `
        <div class="file-icon ${type}">${getFileIcon(type)}</div>
        <div class="file-name">${file.name}</div>
        <div class="file-size">${file.isDir ? '--' : formatSize(file.size)}</div>
        <div class="file-date">${formatDate(file.modified)}</div>
        <div class="file-type">${file.isDir ? 'Folder' : type}</div>
      `;

      row.addEventListener('click', (e) => handleFileClick(index, e));
      row.addEventListener('dblclick', () => handleFileOpen(file));
      row.addEventListener('contextmenu', (e) => handleContextMenu(e, file, index));
      fileList.appendChild(row);
    });
  }

  function renderGridView() {
    const files = getSortedFiles();
    fileGrid.innerHTML = '';

    if (files.length === 0) {
      fileGrid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);font-size:13px;grid-column:1/-1;">This folder is empty</div>';
      return;
    }

    files.forEach((file, index) => {
      const type = getFileType(file.name, file.isDir);
      const item = document.createElement('div');
      item.className = 'file-grid-item' + (state.selected.has(index) ? ' selected' : '');
      item.dataset.index = index;
      item.innerHTML = `
        <div class="file-grid-icon ${type}">${getFileIcon(type)}</div>
        <div class="file-grid-name" title="${file.name}">${file.name}</div>
      `;

      item.addEventListener('click', (e) => handleFileClick(index, e));
      item.addEventListener('dblclick', () => handleFileOpen(file));
      item.addEventListener('contextmenu', (e) => handleContextMenu(e, file, index));
      fileGrid.appendChild(item);
    });
  }

  // --- File interactions ---
  function handleFileClick(index, e) {
    if (e.ctrlKey || e.metaKey) {
      if (state.selected.has(index)) {
        state.selected.delete(index);
      } else {
        state.selected.add(index);
      }
    } else if (e.shiftKey && state.lastSelected >= 0) {
      const start = Math.min(state.lastSelected, index);
      const end = Math.max(state.lastSelected, index);
      for (let i = start; i <= end; i++) {
        state.selected.add(i);
      }
    } else {
      state.selected.clear();
      state.selected.add(index);
    }
    state.lastSelected = index;
    render();
    updateStatusBar();
    updatePreview(index);
  }

  function handleFileOpen(file) {
    if (file.isDir) {
      navigateTo(state.currentPath + '/' + file.name);
    } else {
      downloadFile(file);
    }
  }

  function handleContextMenu(e, file, index) {
    e.preventDefault();
    e.stopPropagation();
    state.contextFile = file;
    if (!state.selected.has(index)) {
      state.selected.clear();
      state.selected.add(index);
      render();
    }
    contextMenu.style.left = e.clientX + 'px';
    contextMenu.style.top = e.clientY + 'px';
    contextMenu.classList.add('visible');
  }

  // --- Context menu actions ---
  contextMenu.querySelectorAll('.ctx-item').forEach(item => {
    item.addEventListener('click', () => {
      const action = item.dataset.action;
      const file = state.contextFile;
      contextMenu.classList.remove('visible');

      if (!file) return;

      switch (action) {
        case 'open': handleFileOpen(file); break;
        case 'download': downloadFile(file); break;
        case 'rename': startRename(file); break;
        case 'copy': copyFiles('copy'); break;
        case 'move': copyFiles('move'); break;
        case 'share': showToast('Sharing coming soon'); break;
        case 'delete': deleteFiles(); break;
      }
    });
  });

  async function downloadFile(file) {
    const path = state.currentPath + '/' + file.name;
    try {
      const a = document.createElement('a');
      a.href = '/api/raw' + path + '?inline=false';
      a.download = file.name;
      a.click();
      showToast('Downloading ' + file.name);
    } catch (e) {
      showToast('Download failed');
    }
  }

  function startRename(file) {
    const rows = fileList.querySelectorAll('.file-row');
    const files = getSortedFiles();
    const idx = files.indexOf(file);
    if (idx < 0 || !rows[idx]) return;

    const nameEl = rows[idx].querySelector('.file-name');
    const oldName = file.name;
    nameEl.innerHTML = `<input class="rename-input" value="${oldName}" />`;
    const input = nameEl.querySelector('input');
    input.focus();
    const dotIdx = oldName.lastIndexOf('.');
    input.setSelectionRange(0, dotIdx > 0 ? dotIdx : oldName.length);

    const finish = async (newName) => {
      if (newName && newName !== oldName) {
        try {
          await fetch('/api/resources' + state.currentPath + '/' + oldName, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: newName })
          });
          file.name = newName;
          showToast(`Renamed to ${newName}`);
        } catch (e) {
          showToast('Rename failed');
        }
      }
      render();
    };

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') finish(input.value);
      if (e.key === 'Escape') render();
    });
    input.addEventListener('blur', () => finish(input.value));
  }

  function copyFiles(action) {
    const files = getSortedFiles();
    state.clipboard = {
      files: Array.from(state.selected).map(i => ({ ...files[i], sourcePath: state.currentPath })),
      action: action
    };
    showToast(`${state.clipboard.files.length} file(s) ${action === 'copy' ? 'copied' : 'cut'}`);
  }

  async function deleteFiles() {
    const files = getSortedFiles();
    const toDelete = Array.from(state.selected).map(i => files[i]);
    if (!confirm(`Delete ${toDelete.length} file(s)?`)) return;

    for (const file of toDelete) {
      try {
        await fetch('/api/resources' + state.currentPath + '/' + file.name, { method: 'DELETE' });
      } catch (e) {
        showToast('Failed to delete ' + file.name);
      }
    }
    showToast(`Deleted ${toDelete.length} file(s)`);
    loadFiles(state.currentPath);
  }

  // --- Preview ---
  function updatePreview(index) {
    const files = getSortedFiles();
    const file = files[index];
    if (!file || state.selected.size !== 1) {
      previewPanel.classList.remove('visible');
      return;
    }

    previewPanel.classList.add('visible');
    $('previewTitle').textContent = file.name;

    const type = getFileType(file.name, file.isDir);
    const path = state.currentPath + '/' + file.name;

    let thumbHtml;
    if (type === 'image') {
      thumbHtml = `<img src="/api/raw${path}" onerror="this.style.display='none'" />`;
    } else {
      thumbHtml = getFileIcon(type);
    }

    $('previewContent').innerHTML = `
      <div class="preview-thumb">${thumbHtml}</div>
      <div class="preview-info-row"><span class="preview-info-label">Name</span><span class="preview-info-value">${file.name}</span></div>
      <div class="preview-info-row"><span class="preview-info-label">Size</span><span class="preview-info-value">${file.isDir ? '--' : formatSize(file.size)}</span></div>
      <div class="preview-info-row"><span class="preview-info-label">Modified</span><span class="preview-info-value">${formatDate(file.modified)}</span></div>
      <div class="preview-info-row"><span class="preview-info-label">Type</span><span class="preview-info-value">${file.isDir ? 'Folder' : type}</span></div>
    `;
  }

  $('previewClose').addEventListener('click', () => previewPanel.classList.remove('visible'));

  // --- Status bar ---
  function updateStatusBar() {
    const files = getSortedFiles();
    $('itemCount').textContent = `${files.length} item${files.length !== 1 ? 's' : ''}`;
    if (state.selected.size > 0) {
      $('selectedCount').textContent = `${state.selected.size} selected`;
    } else {
      $('selectedCount').textContent = '';
    }
  }

  // --- Drag & Drop Upload ---
  const dropTarget = $('fileListContainer');

  ['dragenter', 'dragover'].forEach(evt => {
    document.addEventListener(evt, (e) => {
      if (e.dataTransfer && e.dataTransfer.types.includes('Files')) {
        e.preventDefault();
        uploadOverlay.classList.add('visible');
      }
    });
  });

  ['dragleave', 'drop'].forEach(evt => {
    document.addEventListener(evt, (e) => {
      if (e.type === 'dragleave' && e.target !== document.documentElement) return;
      uploadOverlay.classList.remove('visible');
    });
  });

  document.addEventListener('drop', async (e) => {
    e.preventDefault();
    uploadOverlay.classList.remove('visible');
    const files = e.dataTransfer?.files;
    if (files && files.length > 0) {
      uploadFiles(files);
    }
  });

  // --- Upload ---
  $('uploadBtn').addEventListener('click', () => $('fileInput').click());
  $('fileInput').addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
      uploadFiles(e.target.files);
      e.target.value = '';
    }
  });

  async function uploadFiles(filesList) {
    const progress = $('uploadProgress');
    const progressFill = $('uploadProgressFill');
    const progressTitle = $('uploadProgressTitle');
    const progressInfo = $('uploadProgressInfo');

    progress.classList.add('visible');
    progressTitle.textContent = `Uploading ${filesList.length} file(s)...`;

    for (let i = 0; i < filesList.length; i++) {
      const file = filesList[i];
      progressInfo.textContent = `${file.name} (${i + 1}/${filesList.length})`;
      progressFill.style.width = '0%';

      try {
        const formData = new FormData();
        formData.append('file', file);

        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/resources' + state.currentPath + '/' + file.name);

        await new Promise((resolve, reject) => {
          xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
              progressFill.style.width = (e.loaded / e.total * 100) + '%';
            }
          };
          xhr.onload = () => {
            if (xhr.status >= 200 && xhr.status < 300) resolve();
            else reject(new Error('Upload failed'));
          };
          xhr.onerror = () => reject(new Error('Upload failed'));
          xhr.send(formData);
        });
      } catch (e) {
        showToast(`Failed to upload ${file.name}`);
      }
    }

    progressFill.style.width = '100%';
    progressTitle.textContent = 'Upload complete';
    setTimeout(() => progress.classList.remove('visible'), 2000);
    loadFiles(state.currentPath);
  }

  // --- New Folder ---
  $('newFolderBtn').addEventListener('click', () => {
    $('newFolderDialog').classList.add('visible');
    $('newFolderName').value = '';
    $('newFolderName').focus();
  });

  $('newFolderCancel').addEventListener('click', () => $('newFolderDialog').classList.remove('visible'));

  $('newFolderCreate').addEventListener('click', createNewFolder);
  $('newFolderName').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') createNewFolder();
    if (e.key === 'Escape') $('newFolderDialog').classList.remove('visible');
  });

  async function createNewFolder() {
    const name = $('newFolderName').value.trim();
    if (!name) return;

    $('newFolderDialog').classList.remove('visible');

    try {
      await fetch('/api/resources' + state.currentPath + '/' + name + '/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
      });
      showToast(`Folder "${name}" created`);
      loadFiles(state.currentPath);
    } catch (e) {
      showToast('Failed to create folder');
    }
  }

  // --- Sort ---
  $('fileListHeader').addEventListener('click', (e) => {
    const col = e.target.closest('[data-sort]');
    if (!col) return;
    const sortBy = col.dataset.sort;
    if (state.sortBy === sortBy) {
      state.sortAsc = !state.sortAsc;
    } else {
      state.sortBy = sortBy;
      state.sortAsc = true;
    }
    updateSortIndicators();
    render();
  });

  function updateSortIndicators() {
    ['sortName', 'sortSize', 'sortModified'].forEach(id => $(id).textContent = '');
    const map = { name: 'sortName', size: 'sortSize', modified: 'sortModified' };
    const el = $(map[state.sortBy]);
    if (el) el.textContent = state.sortAsc ? '\u25B2' : '\u25BC';
  }

  // --- View toggle ---
  $('viewToggleBtn').addEventListener('click', () => {
    state.viewMode = state.viewMode === 'list' ? 'grid' : 'list';
    render();
  });

  // --- Search ---
  $('fileSearch').addEventListener('input', (e) => {
    state.searchQuery = e.target.value;
    render();
    updateStatusBar();
  });

  // --- Keyboard shortcuts ---
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;

    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (state.selected.size > 0) deleteFiles();
    }
    if (e.key === 'F2') {
      if (state.selected.size === 1) {
        const idx = Array.from(state.selected)[0];
        startRename(getSortedFiles()[idx]);
      }
    }
    if (e.key === 'a' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      const files = getSortedFiles();
      state.selected.clear();
      files.forEach((_, i) => state.selected.add(i));
      render();
      updateStatusBar();
    }
    if (e.key === 'Escape') {
      contextMenu.classList.remove('visible');
      state.selected.clear();
      render();
      updateStatusBar();
    }
  });

  // --- Event listeners ---
  $('backBtn').addEventListener('click', goBack);
  $('forwardBtn').addEventListener('click', goForward);
  $('upBtn').addEventListener('click', goUp);
  $('refreshBtn').addEventListener('click', () => loadFiles(state.currentPath));

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.context-menu')) {
      contextMenu.classList.remove('visible');
    }
  });

  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.addEventListener('click', () => {
      if (el.dataset.path) navigateTo(el.dataset.path);
    });
  });

  // Background context menu
  $('fileListContainer').addEventListener('contextmenu', (e) => {
    if (!e.target.closest('.file-row') && !e.target.closest('.file-grid-item')) {
      e.preventDefault();
      state.contextFile = null;
      // Show background context menu
    }
  });

  // --- Init ---
  function init() {
    renderBreadcrumb();
    loadFiles(state.currentPath);
    loadMounts();
    loadStorageInfo();
    updateSortIndicators();
  }

  init();
})();
</script>
</body>
</html>
