###############################################################
# PostgreSQL — Shared database for marketplace apps
# Deployed in namespace: packalares-platform
###############################################################
apiVersion: v1
kind: Namespace
metadata:
  name: packalares-platform
  labels:
    app.kubernetes.io/part-of: packalares
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: packalares-platform
  labels:
    app: postgres
data:
  pg_hba.conf: |
    # TYPE  DATABASE  USER  ADDRESS       METHOD
    local   all       all                 trust
    host    all       all   127.0.0.1/32  scram-sha-256
    host    all       all   10.42.0.0/16  scram-sha-256
    host    all       all   10.43.0.0/16  scram-sha-256
    host    all       all   0.0.0.0/0     scram-sha-256
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: packalares-platform
  labels:
    app: postgres
type: Opaque
# data populated by setup-platform.sh
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: packalares-platform
  labels:
    app: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: packalares-platform
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: packalares
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: packalares
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: admin-password
            - name: POSTGRES_USER
              value: "packalares"
            - name: POSTGRES_DB
              value: "packalares"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: config
              mountPath: /etc/postgresql/pg_hba.conf
              subPath: pg_hba.conf
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - packalares
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - packalares
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: config
          configMap:
            name: postgres-config
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: packalares-platform
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: packalares
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP
