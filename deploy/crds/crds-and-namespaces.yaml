# Phase 3: Kubernetes Management
# Applied BEFORE any services — creates namespaces, CRDs, RBAC
---
apiVersion: v1
kind: Namespace
metadata:
  name: os-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: os-framework
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
# User CRD (iam.kubesphere.io)
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: users.iam.kubesphere.io
spec:
  group: iam.kubesphere.io
  names:
    plural: users
    singular: user
    kind: User
    listKind: UserList
    categories: [iam]
  scope: Cluster
  versions:
  - name: v1alpha2
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: [email]
            properties:
              email: {type: string}
              initialPassword: {type: string}
              lang: {type: string}
              description: {type: string}
              displayName: {type: string}
              groups:
                type: array
                items: {type: string}
          status:
            type: object
            properties:
              state: {type: string}
              reason: {type: string}
              lastTransitionTime: {type: string, format: date-time}
              lastLoginTime: {type: string, format: date-time}
    subresources:
      status: {}
    additionalPrinterColumns:
    - {name: Email, type: string, jsonPath: ".spec.email"}
    - {name: Status, type: string, jsonPath: ".status.state"}
---
# GlobalRole CRD
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: globalroles.iam.kubesphere.io
spec:
  group: iam.kubesphere.io
  names:
    plural: globalroles
    singular: globalrole
    kind: GlobalRole
    categories: [iam]
  scope: Cluster
  versions:
  - name: v1alpha2
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        x-kubernetes-preserve-unknown-fields: true
---
# GlobalRoleBinding CRD
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: globalrolebindings.iam.kubesphere.io
spec:
  group: iam.kubesphere.io
  names:
    plural: globalrolebindings
    singular: globalrolebinding
    kind: GlobalRoleBinding
    categories: [iam]
  scope: Cluster
  versions:
  - name: v1alpha2
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        x-kubernetes-preserve-unknown-fields: true
---
# Admin service account (used by all framework services)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: packalares-admin
  namespace: os-framework
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: packalares-admin
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
- nonResourceURLs: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: packalares-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: packalares-admin
subjects:
- kind: ServiceAccount
  name: packalares-admin
  namespace: os-framework
