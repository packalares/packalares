###############################################################
# LLDAP — Lightweight LDAP directory for user management
# Deployed in namespace: packalares-auth
###############################################################
apiVersion: v1
kind: Namespace
metadata:
  name: packalares-auth
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lldap-data
  namespace: packalares-auth
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: lldap-credentials
  namespace: packalares-auth
type: Opaque
# data populated by setup-auth.sh
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lldap
  namespace: packalares-auth
  labels:
    app: lldap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lldap
  template:
    metadata:
      labels:
        app: lldap
    spec:
      containers:
        - name: lldap
          image: lldap/lldap:v0.6.1
          ports:
            - containerPort: 3890
              name: ldap
            - containerPort: 17170
              name: http
          env:
            - name: LLDAP_LDAP_BASE_DN
              value: "dc=packalares,dc=local"
            - name: LLDAP_LDAP_USER_PASS
              valueFrom:
                secretKeyRef:
                  name: lldap-credentials
                  key: admin-password
            - name: LLDAP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lldap-credentials
                  key: jwt-secret
            - name: LLDAP_LDAP_USER_DN
              value: "admin"
            - name: LLDAP_HTTP_URL
              value: "https://auth.__USER_ZONE__"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lldap-data
---
apiVersion: v1
kind: Service
metadata:
  name: lldap-svc
  namespace: packalares-auth
  labels:
    app: lldap
spec:
  selector:
    app: lldap
  ports:
    - name: ldap
      port: 3890
      targetPort: 3890
    - name: http
      port: 17170
      targetPort: 17170
