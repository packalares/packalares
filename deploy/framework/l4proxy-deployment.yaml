apiVersion: v1
kind: ServiceAccount
metadata:
  name: l4-bfl-proxy
  namespace: os-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: packalares-l4proxy
rules:
  - apiGroups: ["iam.kubesphere.io"]
    resources: ["users"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["app.bytetrade.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: packalares-l4proxy
subjects:
  - kind: ServiceAccount
    name: l4-bfl-proxy
    namespace: os-system
roleRef:
  kind: ClusterRole
  name: packalares-l4proxy
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: l4-bfl-proxy
  namespace: os-system
  labels:
    app: l4-bfl-proxy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: l4-bfl-proxy
  template:
    metadata:
      labels:
        app: l4-bfl-proxy
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: l4-bfl-proxy
      priorityClassName: system-cluster-critical
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 10
              preference:
                matchExpressions:
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
                  - key: node-role.kubernetes.io/master
                    operator: Exists
      containers:
        - name: l4proxy
          image: ghcr.io/packalares/l4proxy:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: L4_PROXY_LISTEN_PORT
              value: "443"
            - name: BFL_INGRESS_PORT
              value: "443"
            - name: USER_NAMESPACE_PREFIX
              value: "user-space"
            - name: OLARES_LOCAL_DOMAIN
              value: "olares.local"
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          ports:
            - containerPort: 443
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 443
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 8
            timeoutSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 443
            periodSeconds: 3
            failureThreshold: 5
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: "2"
              memory: 256Mi
