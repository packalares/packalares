---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kvrocks
  namespace: packalares-platform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kvrocks
  template:
    metadata:
      labels:
        app: kvrocks
    spec:
      initContainers:
      - name: fix-permissions
        image: busybox:1.36
        command: ["sh", "-c", "chown -R 999:999 /kvrocks/data"]
        volumeMounts:
        - name: data
          mountPath: /kvrocks/data
      containers:
      - name: kvrocks
        image: apache/kvrocks:2.15.0
        ports:
        - containerPort: 6666
          name: kvrocks
        args:
        - --bind
        - "0.0.0.0"
        - --dir
        - /kvrocks/data
        - --requirepass
        - "57663c0bf6836c0d3429465bd3f65144"
        volumeMounts:
        - name: data
          mountPath: /kvrocks/data
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: "1"
            memory: 1Gi
        readinessProbe:
          tcpSocket:
            port: 6666
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 6666
          initialDelaySeconds: 15
          periodSeconds: 10
      volumes:
      - name: data
        hostPath:
          path: /var/lib/packalares/kvrocks-data
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: kvrocks-svc
  namespace: packalares-platform
spec:
  selector:
    app: kvrocks
  ports:
  - port: 6379
    targetPort: 6666
