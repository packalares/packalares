---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lldap
  namespace: {{PLATFORM_NAMESPACE}}
  labels:
    app: lldap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lldap
  template:
    metadata:
      labels:
        app: lldap
    spec:
      initContainers:
      - name: fix-data-permissions
        image: ghcr.io/packalares/busybox:1.36
        command: ["sh", "-c", "chown 1000:1000 /data"]
        volumeMounts:
        - name: data
          mountPath: /data
      containers:
      - name: lldap
        image: ghcr.io/packalares/lldap:v0.5.0
        ports:
        - containerPort: 3890
          name: ldap
        - containerPort: 17170
          name: http
        env:
        - name: LLDAP_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: lldap-secret
              key: jwt-secret
        - name: LLDAP_LDAP_USER_PASS
          valueFrom:
            secretKeyRef:
              name: lldap-secret
              key: admin-password
        - name: LLDAP_LDAP_BASE_DN
          value: "dc=packalares,dc=local"
        - name: LLDAP_DATABASE_URL
          value: "sqlite:///data/lldap.db?mode=rwc"
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        readinessProbe:
          tcpSocket:
            port: 3890
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: lldap-secret
  namespace: {{PLATFORM_NAMESPACE}}
type: Opaque
stringData:
  jwt-secret: "{{LLDAP_JWT_SECRET}}"
  admin-password: "{{LLDAP_ADMIN_PASSWORD}}"
---
apiVersion: v1
kind: Service
metadata:
  name: lldap-svc
  namespace: {{PLATFORM_NAMESPACE}}
spec:
  selector:
    app: lldap
  ports:
  - name: ldap
    port: 3890
    targetPort: 3890
  - name: http
    port: 17170
    targetPort: 17170
