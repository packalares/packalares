apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: "{{ .Release.Namespace }}"
  labels:
    app: openwebui
    app.kubernetes.io/instance: openwebui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openwebui
        app.kubernetes.io/instance: openwebui
    spec:
      initContainers:
        - name: init-chmod-data
          image: "docker.io/busybox:1.37.0"
          command: ["sh", "-c", "chown -R 1000:1000 /app-data"]
          volumeMounts:
            - name: data
              mountPath: /app-data
          securityContext:
            runAsUser: 0
      containers:
        - name: openwebui
          image: "ghcr.io/open-webui/open-webui:0.8.12"
          env:
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: OLLAMA_BASE_URL
              value: "http://ollama.{{ .Release.Namespace }}:11434"
            - name: WEBUI_AUTH
              value: "false"
            - name: DATA_DIR
              value: "/app/backend/data"
            - name: HF_HUB_OFFLINE
              value: "true"
            - name: RAG_EMBEDDING_ENGINE
              value: "ollama"
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 8Gi
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
      volumes:
        - name: data
          hostPath:
            path: "{{ .Values.appData }}/openwebui/data"
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: openwebui-svc
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: openwebui
