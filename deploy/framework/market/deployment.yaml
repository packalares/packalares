apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-backend
  namespace: {{FRAMEWORK_NAMESPACE}}
  labels:
    app: market-backend
    tier: framework
spec:
  replicas: 1
  selector:
    matchLabels:
      app: market-backend
  template:
    metadata:
      labels:
        app: market-backend
        tier: framework
    spec:
      containers:
        - name: market-backend
          image: ghcr.io/packalares/market:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 6756
              name: http
              protocol: TCP
          env:
            - name: MARKET_LISTEN_ADDR
              value: ":6756"
            - name: MARKET_DATA_DIR
              value: "/data/market"
            - name: APP_SERVICE_URL
              value: "http://app-service:6755"
          volumeMounts:
            - name: market-data
              mountPath: /data/market
          livenessProbe:
            httpGet:
              path: /market/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /market/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: market-data
          hostPath:
            path: /packalares/market
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: market-backend
  namespace: {{FRAMEWORK_NAMESPACE}}
  labels:
    app: market-backend
spec:
  selector:
    app: market-backend
  ports:
    - port: 6756
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
