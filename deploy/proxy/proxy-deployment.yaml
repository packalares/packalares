apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: proxy
  namespace: {{FRAMEWORK_NAMESPACE}}
spec:
  selector:
    matchLabels:
      app: proxy
  template:
    metadata:
      labels:
        app: proxy
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: packalares-admin
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule
      containers:
      - name: nginx
        image: ghcr.io/packalares/nginx:stable-alpine
        imagePullPolicy: Always
        ports:
        - containerPort: 443
          hostPort: 443
        - containerPort: 80
          hostPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: includes
          mountPath: /etc/nginx/includes
        - name: tls
          mountPath: /etc/tls
          readOnly: true
        - name: ca
          mountPath: /etc/ca
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: proxy-config
          items:
          - key: nginx.conf
            path: nginx.conf
      - name: includes
        configMap:
          name: proxy-config
          items:
          - key: includes_upstreams.conf
            path: upstreams.conf
          - key: includes_auth-subrequest.conf
            path: auth-subrequest.conf
          - key: includes_public-api.conf
            path: public-api.conf
          - key: includes_protected-api.conf
            path: protected-api.conf
          - key: includes_websocket.conf
            path: websocket.conf
          - key: includes_static-assets.conf
            path: static-assets.conf
          - key: includes_cors.conf
            path: cors.conf
      - name: tls
        secret:
          secretName: {{TLS_SECRET_NAME}}
      - name: ca
        configMap:
          name: packalares-ca
