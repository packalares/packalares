# Model configuration — name, hfRepo, storagePath, resources injected by appservice
model:
  hfRef: "main"
  doneName: ".done"

# vLLM server settings
vllm:
  image: "docker.io/vllm/vllm-openai:v0.17.1-cu130"
  gpuMemoryUtilization: "0.9"
  maxModelLen: "auto"
  tensorParallelSize: 1

# HF downloader settings
downloader:
  image: "ghcr.io/packalares/hf-downloader:latest"

# Optional tiktoken files (for OpenAI models)
tiktoken:
  enabled: false
  files: ""
  dir: "/data/tiktoken"

# Resources, HF auth — injected by appservice from catalog data
# Do NOT set defaults here — deepMergeUnder won't overwrite them
