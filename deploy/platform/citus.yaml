---
apiVersion: v1
kind: Namespace
metadata:
  name: os-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: citus-config
  namespace: {{PLATFORM_NAMESPACE}}
data:
  POSTGRES_DB: "packalares"
  POSTGRES_USER: "{{PG_USER}}"
  init-databases.sql: |
    SELECT 'CREATE DATABASE infisical' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'infisical')\gexec
---
apiVersion: v1
kind: Secret
metadata:
  name: citus-secret
  namespace: {{PLATFORM_NAMESPACE}}
type: Opaque
stringData:
  POSTGRES_PASSWORD: "{{PG_PASSWORD}}"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: citus-coordinator
  namespace: {{PLATFORM_NAMESPACE}}
  labels:
    app: citus
    role: coordinator
spec:
  serviceName: citus-coordinator
  replicas: 1
  selector:
    matchLabels:
      app: citus
      role: coordinator
  template:
    metadata:
      labels:
        app: citus
        role: coordinator
    spec:
      containers:
      - name: citus
        image: citusdata/citus:12.1
        ports:
        - containerPort: 5432
          name: postgres
        envFrom:
        - configMapRef:
            name: citus-config
        - secretRef:
            name: citus-secret
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "2"
            memory: 2Gi
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "{{PG_USER}}"]
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "{{PG_USER}}"]
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: init-scripts
        configMap:
          name: citus-config
          items:
          - key: init-databases.sql
            path: init-databases.sql
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: citus-coordinator-svc
  namespace: {{PLATFORM_NAMESPACE}}
spec:
  selector:
    app: citus
    role: coordinator
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
