server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /desktop/ {
        alias /usr/share/nginx/html/desktop/;
        try_files $uri $uri/ /desktop/index.html;
    }
    location /market/ {
        alias /usr/share/nginx/html/market/;
        try_files $uri $uri/ /market/index.html;
    }
    location /files/ {
        alias /usr/share/nginx/html/files/;
        try_files $uri $uri/ /files/index.html;
    }
    location /settings/ {
        alias /usr/share/nginx/html/settings/;
        try_files $uri $uri/ /settings/index.html;
    }
    location /dashboard/ {
        alias /usr/share/nginx/html/dashboard/;
        try_files $uri $uri/ /dashboard/index.html;
    }
    location /login/ {
        alias /usr/share/nginx/html/login/;
        try_files $uri $uri/ /login/index.html;
    }
    location /wizard/ {
        alias /usr/share/nginx/html/wizard/;
        try_files $uri $uri/ /wizard/index.html;
    }
    location = / {
        return 302 /desktop/;
    }
    location / {
        try_files $uri $uri/ /desktop/index.html;
    }
}
