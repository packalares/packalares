---
apiVersion: v1
kind: Namespace
metadata:
  name: os-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: citus-config
  namespace: os-system
data:
  POSTGRES_DB: "olares"
  POSTGRES_USER: "olares"
---
apiVersion: v1
kind: Secret
metadata:
  name: citus-secret
  namespace: os-system
type: Opaque
stringData:
  POSTGRES_PASSWORD: "{{PG_PASSWORD}}"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: citus-coordinator
  namespace: os-system
  labels:
    app: citus
    role: coordinator
spec:
  serviceName: citus-coordinator
  replicas: 1
  selector:
    matchLabels:
      app: citus
      role: coordinator
  template:
    metadata:
      labels:
        app: citus
        role: coordinator
    spec:
      containers:
      - name: citus
        image: citusdata/citus:12.1
        ports:
        - containerPort: 5432
          name: postgres
        envFrom:
        - configMapRef:
            name: citus-config
        - secretRef:
            name: citus-secret
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "2"
            memory: 2Gi
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "olares"]
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "olares"]
          initialDelaySeconds: 30
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: citus-coordinator-svc
  namespace: os-system
spec:
  selector:
    app: citus
    role: coordinator
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
