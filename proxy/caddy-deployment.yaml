# Caddy reverse proxy — DaemonSet with hostNetwork
# Namespace: packalares-system
# Replaces: L4 proxy, BFL nginx, OpenResty, Lua scripts, token_auth

apiVersion: v1
kind: Namespace
metadata:
  name: packalares-system
  labels:
    app.kubernetes.io/part-of: packalares

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: caddy
  namespace: packalares-system

---

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: caddy
  namespace: packalares-system
  labels:
    app: caddy
    app.kubernetes.io/name: caddy
    app.kubernetes.io/component: reverse-proxy
    app.kubernetes.io/part-of: packalares
spec:
  selector:
    matchLabels:
      app: caddy
  template:
    metadata:
      labels:
        app: caddy
        app.kubernetes.io/name: caddy
        app.kubernetes.io/component: reverse-proxy
    spec:
      serviceAccountName: caddy
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 30
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: caddy
          image: caddy:2.9
          ports:
            - name: http
              containerPort: 80
              hostPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              hostPort: 443
              protocol: TCP
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
              readOnly: true
            - name: caddy-data
              mountPath: /data
            - name: caddy-runtime-config
              mountPath: /config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 5
      volumes:
        - name: caddyfile
          configMap:
            name: caddy-config
        - name: caddy-data
          emptyDir: {}
        - name: caddy-runtime-config
          emptyDir: {}
