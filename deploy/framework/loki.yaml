# Loki — log aggregation, receives logs from Promtail
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: {{MONITORING_NAMESPACE}}
  labels:
    app: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
      - name: loki
        image: grafana/loki:2.9.4
        ports:
        - containerPort: 3100
        args:
        - -config.file=/etc/loki/loki.yaml
        volumeMounts:
        - name: config
          mountPath: /etc/loki
        - name: data
          mountPath: /loki
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /ready
            port: 3100
          initialDelaySeconds: 15
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: loki-config
      - name: data
        hostPath:
          path: /var/lib/packalares/loki-data
          type: DirectoryOrCreate
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: {{MONITORING_NAMESPACE}}
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2020-10-24
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      retention_period: 168h
    compactor:
      working_directory: /loki/compactor
      retention_enabled: true
---
apiVersion: v1
kind: Service
metadata:
  name: loki-svc
  namespace: {{MONITORING_NAMESPACE}}
spec:
  selector:
    app: loki
  ports:
  - port: 3100
    targetPort: 3100
