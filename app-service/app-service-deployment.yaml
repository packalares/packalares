apiVersion: v1
kind: Namespace
metadata:
  name: packalares-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: packalares-apps
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-catalog
  namespace: packalares-system
data:
  catalog.json: |
    # Mounted from the catalog.json file at build time.
    # In production this ConfigMap is generated by:
    #   kubectl create configmap app-catalog \
    #     --from-file=catalog.json=catalog.json \
    #     -n packalares-system --dry-run=client -o yaml | kubectl apply -f -
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-service
  namespace: packalares-system
---
# The app-service needs permissions to manage Helm releases
# and read pod/service state in the apps namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: app-service
rules:
  # Helm needs broad access in the target namespace
  - apiGroups: ["", "apps", "batch", "extensions", "networking.k8s.io"]
    resources: ["*"]
    verbs: ["*"]
  # Read cluster-wide info for status
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: app-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: app-service
subjects:
  - kind: ServiceAccount
    name: app-service
    namespace: packalares-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-service
  namespace: packalares-system
  labels:
    app.kubernetes.io/name: app-service
    app.kubernetes.io/part-of: packalares
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-service
        app.kubernetes.io/part-of: packalares
    spec:
      serviceAccountName: app-service
      containers:
        - name: app-service
          image: packalares/app-service:latest
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: NAMESPACE
              value: "packalares-apps"
            - name: CATALOG_PATH
              value: "/etc/packalares/catalog.json"
            - name: APP_SERVICE_PORT
              value: "5000"
          volumeMounts:
            - name: catalog
              mountPath: /etc/packalares/catalog.json
              subPath: catalog.json
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: catalog
          configMap:
            name: app-catalog
---
apiVersion: v1
kind: Service
metadata:
  name: app-service
  namespace: packalares-system
  labels:
    app.kubernetes.io/name: app-service
    app.kubernetes.io/part-of: packalares
spec:
  selector:
    app.kubernetes.io/name: app-service
  ports:
    - port: 5000
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
