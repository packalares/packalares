apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: packalares-platform
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        args:
        - redis-server
        - --requirepass
        - "$(REDIS_PASSWORD)"
        - --maxmemory-policy
        - noeviction
        - --appendonly
        - "yes"
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        hostPath:
          path: /var/lib/packalares/redis-data
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: packalares-platform
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
