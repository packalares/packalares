# Infisical requires its own Redis instance (KVRocks doesn't support BullMQ's XADD MAXLEN ~)
# The Redis below is dedicated to Infisical only.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infisical-redis
  namespace: {{PLATFORM_NAMESPACE}}
  labels:
    app: infisical-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infisical-redis
  template:
    metadata:
      labels:
        app: infisical-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        args:
        - redis-server
        - --maxmemory-policy
        - noeviction
        - --appendonly
        - "yes"
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 250m
            memory: 128Mi
      volumes:
      - name: data
        hostPath:
          path: /var/lib/packalares/infisical-redis-data
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: infisical-redis-svc
  namespace: {{PLATFORM_NAMESPACE}}
spec:
  selector:
    app: infisical-redis
  ports:
  - port: 6379
    targetPort: 6379
---
apiVersion: v1
kind: Secret
metadata:
  name: infisical-secrets
  namespace: {{PLATFORM_NAMESPACE}}
type: Opaque
stringData:
  ENCRYPTION_KEY: "{{ENCRYPTION_KEY}}"
  AUTH_SECRET: "{{AUTH_SECRET}}"
  PGUSER: "{{PG_USER}}"
  PGPASSWORD: "{{PG_PASSWORD}}"
  DB_CONNECTION_URI: "postgresql://{{PG_USER}}:{{PG_PASSWORD}}@citus-coordinator-svc.{{PLATFORM_NAMESPACE}}:5432/infisical?sslmode=disable"
  REDIS_URL: "redis://infisical-redis-svc.{{PLATFORM_NAMESPACE}}:6379/0"
  SITE_URL: "https://infisical.{{USER_ZONE}}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infisical
  namespace: {{PLATFORM_NAMESPACE}}
  labels:
    app: infisical
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infisical
  template:
    metadata:
      labels:
        app: infisical
    spec:
      initContainers:
      - name: wait-for-postgres
        image: postgres:16.0-alpine3.18
        command:
          - sh
          - -c
          - >-
            echo "Waiting for PostgreSQL ...";
            until psql -h $PGHOST -p 5432 -U $PGUSER -d $PGDB -c "SELECT 1" 2>/dev/null; do
              sleep 2; printf ".";
            done;
            echo " PostgreSQL is ready";
        env:
        - name: PGHOST
          value: "citus-coordinator-svc.{{PLATFORM_NAMESPACE}}"
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: infisical-secrets
              key: PGUSER
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: infisical-secrets
              key: PGPASSWORD
        - name: PGDB
          value: "infisical"
      - name: wait-for-redis
        image: redis:7-alpine
        command:
          - sh
          - -c
          - >-
            echo "Waiting for Redis ...";
            until redis-cli -h infisical-redis-svc.{{PLATFORM_NAMESPACE}} ping 2>/dev/null | grep -q PONG; do
              sleep 2; printf ".";
            done;
            echo " Redis is ready";
      - name: migration
        image: infisical/infisical:v0.158.20
        command: ["npm", "run", "migration:latest"]
        envFrom:
        - secretRef:
            name: infisical-secrets
        env:
        - name: NODE_ENV
          value: "production"
      containers:
      - name: infisical
        image: infisical/infisical:v0.158.20
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: infisical-secrets
        env:
        - name: NODE_ENV
          value: "production"
        - name: TELEMETRY_ENABLED
          value: "false"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 768Mi
        readinessProbe:
          httpGet:
            path: /api/status
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: infisical-svc
  namespace: {{PLATFORM_NAMESPACE}}
spec:
  selector:
    app: infisical
  ports:
  - port: 8080
    targetPort: 8080
