apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-service
  namespace: {{FRAMEWORK_NAMESPACE}}
  labels:
    app: app-service
    tier: framework
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-service
  template:
    metadata:
      labels:
        app: app-service
        tier: framework
    spec:
      serviceAccountName: app-service
      initContainers:
      - name: wait-for-tapr
        image: ghcr.io/packalares/busybox:1.36
        command:
          - sh
          - -c
          - >-
            echo "Waiting for tapr ...";
            until wget -q -O- http://tapr-svc.{{PLATFORM_NAMESPACE}}:8080/healthz 2>/dev/null | grep -q ok; do
              sleep 2; printf ".";
            done;
            echo " tapr is ready";
      containers:
        - name: app-service
          image: ghcr.io/packalares/appservice:latest
          ports:
            - containerPort: 6755
              name: http
              protocol: TCP
          env:
            - name: APP_DATA_DIR
              value: /var/lib/packalares/appservice
            - name: LISTEN_ADDR
              value: ":6755"
            - name: APP_NAMESPACE
              value: "user-space-{{USERNAME}}"
            - name: TAPR_URL
              value: "http://tapr-svc.{{PLATFORM_NAMESPACE}}:8080"
            - name: TAPR_AUTH_TOKEN
              value: "{{TAPR_AUTH_TOKEN}}"
            - name: APP_OWNER
              value: "{{USERNAME}}"
            - name: USERNAME
              value: "{{USERNAME}}"
            - name: USER_ZONE
              value: "{{USER_ZONE}}"
            - name: SERVER_IP
              value: "{{SERVER_IP}}"
            - name: CHART_REPO_URL
              value: "http://chart-repo-service.{{FRAMEWORK_NAMESPACE}}:82/"
            - name: LLDAP_HOST
              value: "http://lldap-svc.{{PLATFORM_NAMESPACE}}:17170"
            - name: SYS_APPS
              value: ""
            - name: GENERATED_APPS
              value: ""
          volumeMounts:
            - name: data
              mountPath: /var/lib/packalares/appservice
            - name: containerd-sock
              mountPath: /run/containerd/containerd.sock
              readOnly: true
          livenessProbe:
            httpGet:
              path: /app-service/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /app-service/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: app-service-data
        - name: containerd-sock
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
---
apiVersion: v1
kind: Service
metadata:
  name: app-service
  namespace: {{FRAMEWORK_NAMESPACE}}
  labels:
    app: app-service
spec:
  selector:
    app: app-service
  ports:
    - port: 6755
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-service-data
  namespace: {{FRAMEWORK_NAMESPACE}}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-service
  namespace: {{FRAMEWORK_NAMESPACE}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: app-service
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "services", "namespaces", "configmaps", "secrets", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["app.{{API_GROUP}}"]
    resources: ["applications", "applicationmanagers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["sys.{{API_GROUP}}"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings", "roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: app-service
subjects:
  - kind: ServiceAccount
    name: app-service
    namespace: {{FRAMEWORK_NAMESPACE}}
roleRef:
  kind: ClusterRole
  name: app-service
  apiGroup: rbac.authorization.k8s.io
