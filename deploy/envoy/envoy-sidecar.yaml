# Envoy sidecar config template for per-app auth
# Injected into every installed app pod by the system-server
#
# How it works:
# 1. An init container runs iptables to redirect all inbound traffic to Envoy (port 15001)
# 2. Envoy receives the traffic and calls the ext_authz filter
# 3. ext_authz sends a subrequest to auth-svc:9091/api/verify
# 4. If auth returns 200, Envoy forwards the request to the app
# 5. If auth returns 401, Envoy returns 401 to the client
#
# The init container and sidecar are injected into the app's pod spec
# by the system-server when it processes a new Application CRD.

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-sidecar-config
  namespace: {{FRAMEWORK_NAMESPACE}}
data:
  envoy.yaml: |
    static_resources:
      listeners:
      - name: inbound
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 15001
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              route_config:
                name: local_route
                virtual_hosts:
                - name: app
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: local_app
              http_filters:
              - name: envoy.filters.http.ext_authz
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                  http_service:
                    server_uri:
                      uri: auth-svc.{{FRAMEWORK_NAMESPACE}}.svc.cluster.local:9091
                      cluster: auth_service
                      timeout: 5s
                    path_prefix: /api/verify
                    authorization_request:
                      headers_to_add:
                      - key: X-Forwarded-Host
                        value: "%REQ(:authority)%"
                      allowed_headers:
                        patterns:
                        - exact: cookie
                        - exact: authorization
                    authorization_response:
                      allowed_upstream_headers:
                        patterns:
                        - exact: remote-user
                        - exact: remote-groups
                        - exact: remote-auth-level
                  failure_mode_allow: false
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
      - name: local_app
        type: STATIC
        connect_timeout: 5s
        load_assignment:
          cluster_name: local_app
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: APP_PORT_PLACEHOLDER
      - name: auth_service
        type: STRICT_DNS
        connect_timeout: 5s
        load_assignment:
          cluster_name: auth_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: auth-svc.{{FRAMEWORK_NAMESPACE}}.svc.cluster.local
                    port_value: 9091
    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 15000
