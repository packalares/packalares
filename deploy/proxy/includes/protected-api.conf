location /api/auth/verify   { auth_request /_auth; proxy_pass http://$auth_up:9091/api/verify; proxy_set_header Host $host; proxy_set_header Cookie $http_cookie; }
location /api/auth/password { auth_request /_auth; proxy_pass http://$auth_up:9091/api/auth/password; proxy_set_header Host $host; proxy_set_header Cookie $http_cookie; }
location /api/auth/ { auth_request /_auth; proxy_pass http://$auth_up:9091; proxy_set_header Host $host; proxy_set_header Cookie $http_cookie; }
location /api/market/ { auth_request /_auth; rewrite ^/api/market/(.*) /market/v1/$1 break; proxy_pass http://$market_up:6756; proxy_set_header Host $host; }
location /api/apps/ { auth_request /_auth; rewrite ^/api/apps/(.*) /app-service/v1/$1 break; proxy_pass http://$app_up:6755; proxy_set_header Host $host; proxy_set_header Cookie $http_cookie; }
location /api/models/ { auth_request /_auth; rewrite ^/api/models/(.*) /app-service/v1/models/$1 break; proxy_pass http://$app_up:6755; proxy_set_header Host $host; proxy_set_header Cookie $http_cookie; }
location /api/desktop/init { auth_request /_auth; proxy_pass http://$app_up:6755/server/init; proxy_set_header Host $host; proxy_set_header Cookie $http_cookie; }
location /api/desktop/myApps { auth_request /_auth; proxy_pass http://$app_up:6755/server/myApps; proxy_set_header Host $host; proxy_set_header Cookie $http_cookie; }
location /api/desktop/upgrade { auth_request /_auth; proxy_pass http://$app_up:6755/server/upgrade/state; proxy_set_header Host $host; proxy_set_header Cookie $http_cookie; }
location /api/desktop/device { auth_request /_auth; proxy_pass http://$app_up:6755/api/device; proxy_set_header Host $host; proxy_set_header Cookie $http_cookie; }
location /api/files/resources { auth_request /_auth; rewrite ^/api/files/resources(.*) /api/resources$1 break; proxy_pass http://$files_up:80; proxy_set_header Host $host; client_max_body_size 10G; }
location /api/files/raw { auth_request /_auth; rewrite ^/api/files/raw(.*) /api/raw$1 break; proxy_pass http://$files_up:80; proxy_set_header Host $host; }
location /api/files/upload { auth_request /_auth; rewrite ^/api/files/upload(.*) /upload$1 break; proxy_pass http://$files_up:80; proxy_set_header Host $host; client_max_body_size 10G; }
location /api/monitor/ { auth_request /_auth; rewrite ^/api/monitor/(.*) /api/$1 break; proxy_pass http://$mon_up:80; proxy_set_header Host $host; }
location /api/mounts { auth_request /_auth; proxy_pass http://$mounts_up:8081; proxy_set_header Host $host; }
    location /api/mounts/ { auth_request /_auth; proxy_pass http://$mounts_up:8081; proxy_set_header Host $host; }
location /api/user/ { auth_request /_auth; proxy_pass http://$bfl_up:80/bfl/; proxy_set_header Host $host; }
location /api/settings/ { auth_request /_auth; proxy_pass http://$bfl_up:80; proxy_set_header Host $host; }
location /bfl/backend/v1/tailscale/ { auth_request /_auth; proxy_pass http://$bfl_up:80; proxy_set_header Host $host; proxy_set_header Cookie $http_cookie; }
location /bfl/backend/v1/network/ { auth_request /_auth; proxy_pass http://$bfl_up:80; proxy_set_header Host $host; proxy_set_header Cookie $http_cookie; }
location = /api/logs { auth_request /_auth; proxy_pass http://$mon_up:80; proxy_set_header Host $host; proxy_set_header Cookie $http_cookie; }
location /api/logs/ { auth_request /_auth; rewrite ^/api/logs/(.*) /api/logs/$1 break; proxy_pass http://$mon_up:80; proxy_set_header Host $host; }
