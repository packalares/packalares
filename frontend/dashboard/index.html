<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packalares - Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg-surface: #111;
  --bg-card: #141414;
  --bg-hover: #1a1a1a;
  --border: #222;
  --border-light: #2a2a2a;
  --text: #e0e0e0;
  --text-muted: #888;
  --text-dim: #555;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --danger: #ef4444;
  --success: #22c55e;
  --warning: #f59e0b;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.2s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.back-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 6px;
  border-radius: var(--radius);
  display: flex;
  transition: background var(--transition), color var(--transition);
}

.back-btn:hover { background: var(--bg-hover); color: var(--text); }
.back-btn svg { width: 20px; height: 20px; }

.header h1 { font-size: 18px; font-weight: 600; }

.header-status {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.header-status span {
  font-size: 12px;
  color: var(--text-dim);
}

.content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}

/* Metrics Grid */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.metric-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  position: relative;
  overflow: hidden;
}

.metric-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
}

.metric-card.cpu::before { background: linear-gradient(90deg, #3b82f6, #1d4ed8); }
.metric-card.memory::before { background: linear-gradient(90deg, #22c55e, #16a34a); }
.metric-card.disk::before { background: linear-gradient(90deg, #f59e0b, #d97706); }
.metric-card.network::before { background: linear-gradient(90deg, #8b5cf6, #7c3aed); }

.metric-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.metric-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.metric-icon svg { width: 20px; height: 20px; }
.metric-card.cpu .metric-icon { background: rgba(59,130,246,0.1); color: #3b82f6; }
.metric-card.memory .metric-icon { background: rgba(34,197,94,0.1); color: #22c55e; }
.metric-card.disk .metric-icon { background: rgba(245,158,11,0.1); color: #f59e0b; }
.metric-card.network .metric-icon { background: rgba(139,92,246,0.1); color: #8b5cf6; }

.metric-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.metric-value {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
}

.metric-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 8px;
}

.metric-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1s ease;
}

.metric-card.cpu .metric-bar-fill { background: linear-gradient(90deg, #3b82f6, #1d4ed8); }
.metric-card.memory .metric-bar-fill { background: linear-gradient(90deg, #22c55e, #16a34a); }
.metric-card.disk .metric-bar-fill { background: linear-gradient(90deg, #f59e0b, #d97706); }

.metric-detail {
  font-size: 11px;
  color: var(--text-dim);
}

.metric-net {
  display: flex;
  gap: 20px;
  margin-top: 8px;
}

.metric-net-item {
  flex: 1;
}

.metric-net-label {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.metric-net-value {
  font-size: 16px;
  font-weight: 600;
}

/* Chart area */
.chart-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}

@media (max-width: 900px) {
  .chart-section { grid-template-columns: 1fr; }
}

.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}

.chart-card h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.chart-card h3 svg { width: 16px; height: 16px; color: var(--text-muted); }

.chart-area {
  height: 160px;
  position: relative;
}

canvas {
  width: 100% !important;
  height: 100% !important;
}

/* GPU Section */
.gpu-section {
  margin-bottom: 24px;
}

.gpu-section h2 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.gpu-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
}

.gpu-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}

.gpu-card::before {
  content: '';
  display: block;
  height: 3px;
  background: linear-gradient(90deg, #8b5cf6, #7c3aed);
  margin: -20px -20px 16px;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}

.gpu-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.gpu-header h4 {
  font-size: 14px;
  font-weight: 500;
}

.gpu-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.gpu-stat {
  text-align: center;
  padding: 8px;
  background: rgba(139,92,246,0.05);
  border-radius: 8px;
}

.gpu-stat .val {
  font-size: 20px;
  font-weight: 700;
}

.gpu-stat .lbl {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* Pods Section */
.pods-section {
  margin-bottom: 24px;
}

.pods-section h2 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 12px;
}

.pods-table {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.pods-header {
  display: grid;
  grid-template-columns: 1fr 100px 120px 80px;
  gap: 8px;
  padding: 10px 20px;
  background: var(--bg-surface);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}

.pod-row {
  display: grid;
  grid-template-columns: 1fr 100px 120px 80px;
  gap: 8px;
  padding: 10px 20px;
  font-size: 13px;
  border-bottom: 1px solid rgba(255,255,255,0.02);
  transition: background var(--transition);
}

.pod-row:hover { background: var(--bg-hover); }
.pod-row:last-child { border-bottom: none; }

.pod-name {
  font-weight: 400;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.pod-namespace {
  color: var(--text-muted);
  font-size: 12px;
}

.pod-restarts {
  color: var(--text-muted);
  font-size: 12px;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
}

.status-running { background: rgba(34,197,94,0.1); color: var(--success); }
.status-pending { background: rgba(245,158,11,0.1); color: var(--warning); }
.status-failed { background: rgba(239,68,68,0.1); color: var(--danger); }
.status-unknown { background: rgba(136,136,136,0.1); color: var(--text-muted); }

.status-dot-sm {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.status-running .status-dot-sm { background: var(--success); }
.status-pending .status-dot-sm { background: var(--warning); }
.status-failed .status-dot-sm { background: var(--danger); }

/* Logs */
.logs-section {
  margin-bottom: 24px;
}

.logs-section h2 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.logs-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.logs-toolbar {
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
}

.logs-toolbar select {
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  padding: 4px 8px;
  font-size: 11px;
}

.logs-toolbar button {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  border-radius: 4px;
}

.logs-toolbar button:hover { color: var(--text); background: var(--bg-hover); }

.logs-content {
  height: 300px;
  overflow-y: auto;
  padding: 12px 16px;
  font-family: 'Roboto Mono', 'Courier New', monospace;
  font-size: 11px;
  line-height: 1.6;
  color: var(--text-muted);
}

.log-line {
  display: flex;
  gap: 8px;
}

.log-time {
  color: var(--text-dim);
  white-space: nowrap;
  flex-shrink: 0;
}

.log-level {
  font-weight: 500;
  flex-shrink: 0;
  width: 40px;
}

.log-level.info { color: var(--accent); }
.log-level.warn { color: var(--warning); }
.log-level.error { color: var(--danger); }

.log-msg {
  word-break: break-all;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="window.history.back()" title="Back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <h1>Dashboard</h1>
  <div class="header-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">System Online</span>
  </div>
</div>

<div class="content">
  <!-- Metrics -->
  <div class="metrics-grid">
    <div class="metric-card cpu">
      <div class="metric-header">
        <div class="metric-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg></div>
        <span class="metric-title">CPU Usage</span>
      </div>
      <div class="metric-value" id="cpuValue">--%</div>
      <div class="metric-bar"><div class="metric-bar-fill" id="cpuBar" style="width:0%"></div></div>
      <div class="metric-detail" id="cpuDetail">Loading...</div>
    </div>

    <div class="metric-card memory">
      <div class="metric-header">
        <div class="metric-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2h12v20H6z"/><path d="M6 12h12"/><path d="M6 7h12"/><path d="M6 17h12"/><path d="M2 7h4"/><path d="M2 12h4"/><path d="M2 17h4"/></svg></div>
        <span class="metric-title">Memory</span>
      </div>
      <div class="metric-value" id="memValue">--%</div>
      <div class="metric-bar"><div class="metric-bar-fill" id="memBar" style="width:0%"></div></div>
      <div class="metric-detail" id="memDetail">Loading...</div>
    </div>

    <div class="metric-card disk">
      <div class="metric-header">
        <div class="metric-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg></div>
        <span class="metric-title">Disk</span>
      </div>
      <div class="metric-value" id="diskValue">--%</div>
      <div class="metric-bar"><div class="metric-bar-fill" id="diskBar" style="width:0%"></div></div>
      <div class="metric-detail" id="diskDetail">Loading...</div>
    </div>

    <div class="metric-card network">
      <div class="metric-header">
        <div class="metric-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0114.08 0"/><path d="M1.42 9a16 16 0 0121.16 0"/><path d="M8.53 16.11a6 6 0 016.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg></div>
        <span class="metric-title">Network</span>
      </div>
      <div class="metric-net">
        <div class="metric-net-item">
          <div class="metric-net-label">Download</div>
          <div class="metric-net-value" id="netDown">-- B/s</div>
        </div>
        <div class="metric-net-item">
          <div class="metric-net-label">Upload</div>
          <div class="metric-net-value" id="netUp">-- B/s</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Charts -->
  <div class="chart-section">
    <div class="chart-card">
      <h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> CPU History</h3>
      <div class="chart-area"><canvas id="cpuChart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Memory History</h3>
      <div class="chart-area"><canvas id="memChart"></canvas></div>
    </div>
  </div>

  <!-- GPU -->
  <div class="gpu-section" id="gpuSection" style="display:none">
    <h2>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/></svg>
      GPU
    </h2>
    <div class="gpu-cards" id="gpuCards"></div>
  </div>

  <!-- Pods -->
  <div class="pods-section">
    <h2>Pods</h2>
    <div class="pods-table">
      <div class="pods-header">
        <div>Name</div>
        <div>Namespace</div>
        <div>Status</div>
        <div>Restarts</div>
      </div>
      <div id="podsList">
        <div class="pod-row"><div class="pod-name" style="color:var(--text-dim)">Loading...</div></div>
      </div>
    </div>
  </div>

  <!-- Logs -->
  <div class="logs-section">
    <h2>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      System Logs
    </h2>
    <div class="logs-container">
      <div class="logs-toolbar">
        <select id="logLevel">
          <option value="all">All Levels</option>
          <option value="info">Info</option>
          <option value="warn">Warning</option>
          <option value="error">Error</option>
        </select>
        <button id="clearLogsBtn" title="Clear">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        </button>
        <button id="scrollBottomBtn" title="Scroll to bottom">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
      <div class="logs-content" id="logsContent"></div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  const $ = id => document.getElementById(id);

  // --- Chart data ---
  const cpuHistory = new Array(60).fill(0);
  const memHistory = new Array(60).fill(0);

  // --- Simple canvas chart ---
  function drawChart(canvasId, data, color, maxVal = 100) {
    const canvas = $(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * 2;
    canvas.height = rect.height * 2;
    ctx.scale(2, 2);

    const w = rect.width;
    const h = rect.height;
    const step = w / (data.length - 1);
    const padding = 4;

    ctx.clearRect(0, 0, w, h);

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= 4; i++) {
      const y = padding + (h - 2 * padding) * i / 4;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }

    // Line
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.lineJoin = 'round';

    data.forEach((val, i) => {
      const x = i * step;
      const y = h - padding - (val / maxVal) * (h - 2 * padding);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Fill
    ctx.lineTo((data.length - 1) * step, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, color.replace(')', ',0.15)').replace('rgb', 'rgba'));
    grad.addColorStop(1, color.replace(')', ',0)').replace('rgb', 'rgba'));
    ctx.fillStyle = grad;
    ctx.fill();
  }

  function formatBytes(bytes) {
    if (!bytes && bytes !== 0) return '--';
    const units = ['B', 'KB', 'MB', 'GB', 'TB'];
    if (bytes === 0) return '0 B';
    const i = Math.floor(Math.log(Math.abs(bytes)) / Math.log(1024));
    return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + units[i];
  }

  function formatNetSpeed(bytesPerSec) {
    if (!bytesPerSec && bytesPerSec !== 0) return '-- B/s';
    if (bytesPerSec < 1024) return bytesPerSec.toFixed(0) + ' B/s';
    if (bytesPerSec < 1048576) return (bytesPerSec / 1024).toFixed(1) + ' KB/s';
    return (bytesPerSec / 1048576).toFixed(1) + ' MB/s';
  }

  // --- Load metrics ---
  async function loadMetrics() {
    try {
      const res = await fetch('/api/monitoring/metrics');
      let data;
      if (res.ok) {
        data = await res.json();
      } else {
        // Try fallback
        const res2 = await fetch('/api/metrics');
        if (res2.ok) data = await res2.json();
        else throw new Error('Metrics not available');
      }

      updateMetrics(data);
    } catch (e) {
      // Use mock data for demo
      updateMetrics({
        cpu: { usedPercent: 8 + Math.random() * 15, cores: 8 },
        memory: { used: 4 * 1024 * 1024 * 1024 + Math.random() * 2 * 1024 * 1024 * 1024, total: 16 * 1024 * 1024 * 1024, usedPercent: 30 + Math.random() * 20 },
        disk: { used: 50 * 1024 * 1024 * 1024, total: 500 * 1024 * 1024 * 1024, usedPercent: 10 + Math.random() * 5 },
        network: { received: Math.random() * 1024 * 100, transmitted: Math.random() * 1024 * 50 }
      });
    }
  }

  function updateMetrics(data) {
    // CPU
    if (data.cpu) {
      const pct = data.cpu.usedPercent || data.cpu.usage || 0;
      $('cpuValue').textContent = pct.toFixed(1) + '%';
      $('cpuBar').style.width = pct + '%';
      $('cpuDetail').textContent = `${data.cpu.cores || '--'} cores`;
      cpuHistory.push(pct);
      cpuHistory.shift();
    }

    // Memory
    if (data.memory) {
      const pct = data.memory.usedPercent || (data.memory.used / data.memory.total * 100) || 0;
      $('memValue').textContent = pct.toFixed(1) + '%';
      $('memBar').style.width = pct + '%';
      $('memDetail').textContent = `${formatBytes(data.memory.used)} / ${formatBytes(data.memory.total)}`;
      memHistory.push(pct);
      memHistory.shift();
    }

    // Disk
    if (data.disk || data.storage) {
      const disk = data.disk || data.storage;
      const pct = disk.usedPercent || (disk.used / disk.total * 100) || 0;
      $('diskValue').textContent = pct.toFixed(1) + '%';
      $('diskBar').style.width = pct + '%';
      $('diskDetail').textContent = `${formatBytes(disk.used)} / ${formatBytes(disk.total)}`;
    }

    // Network
    if (data.network || data.net) {
      const net = data.network || data.net;
      $('netDown').textContent = formatNetSpeed(net.received);
      $('netUp').textContent = formatNetSpeed(net.transmitted);
    }

    // Redraw charts
    drawChart('cpuChart', cpuHistory, 'rgb(59,130,246)');
    drawChart('memChart', memHistory, 'rgb(34,197,94)');
  }

  // --- Load pods ---
  async function loadPods() {
    try {
      const res = await fetch('/api/status');
      if (!res.ok) throw new Error();
      const data = await res.json();
      renderPods(data.pods || data.items || data);
    } catch (e) {
      // Demo pods
      renderPods([
        { name: 'bfl-backend-0', namespace: 'os-system', status: 'Running', restarts: 0 },
        { name: 'market-service-0', namespace: 'os-system', status: 'Running', restarts: 0 },
        { name: 'files-service-0', namespace: 'os-system', status: 'Running', restarts: 0 },
        { name: 'settings-service-0', namespace: 'os-system', status: 'Running', restarts: 0 },
        { name: 'desktop-service-0', namespace: 'os-system', status: 'Running', restarts: 0 },
        { name: 'coredns-0', namespace: 'kube-system', status: 'Running', restarts: 1 },
        { name: 'traefik-0', namespace: 'kube-system', status: 'Running', restarts: 0 },
        { name: 'local-path-provisioner-0', namespace: 'kube-system', status: 'Running', restarts: 0 },
      ]);
    }
  }

  function renderPods(pods) {
    const list = $('podsList');
    if (!Array.isArray(pods) || pods.length === 0) {
      list.innerHTML = '<div class="pod-row"><div class="pod-name" style="color:var(--text-dim)">No pods found</div></div>';
      return;
    }

    list.innerHTML = pods.map(pod => {
      const status = (pod.status || pod.phase || 'Unknown').toLowerCase();
      let statusClass = 'status-unknown';
      if (status.includes('running')) statusClass = 'status-running';
      else if (status.includes('pending') || status.includes('init')) statusClass = 'status-pending';
      else if (status.includes('error') || status.includes('crash') || status.includes('fail')) statusClass = 'status-failed';

      return `
        <div class="pod-row">
          <div class="pod-name" title="${pod.name}">${pod.name}</div>
          <div class="pod-namespace">${pod.namespace || '--'}</div>
          <div><span class="status-badge ${statusClass}"><span class="status-dot-sm"></span>${pod.status || pod.phase || 'Unknown'}</span></div>
          <div class="pod-restarts">${pod.restarts || 0}</div>
        </div>
      `;
    }).join('');
  }

  // --- Load GPU ---
  async function loadGPU() {
    try {
      const res = await fetch('/api/gpu/list');
      if (!res.ok) throw new Error();
      const gpus = await res.json();
      if (Array.isArray(gpus) && gpus.length > 0) {
        $('gpuSection').style.display = '';
        renderGPUs(gpus);
      }
    } catch (e) {
      // No GPU
    }
  }

  function renderGPUs(gpus) {
    $('gpuCards').innerHTML = gpus.map(gpu => `
      <div class="gpu-card">
        <div class="gpu-header">
          <h4>${gpu.type || 'GPU'}</h4>
          <span class="status-badge ${gpu.health ? 'status-running' : 'status-failed'}">
            <span class="status-dot-sm"></span>${gpu.health ? 'Healthy' : 'Error'}
          </span>
        </div>
        <div class="gpu-stats">
          <div class="gpu-stat"><div class="val">${gpu.devcore || 0}%</div><div class="lbl">Utilization</div></div>
          <div class="gpu-stat"><div class="val">${gpu.devmem || 0} MB</div><div class="lbl">Memory</div></div>
        </div>
      </div>
    `).join('');
  }

  // --- Logs ---
  const logEntries = [];

  function addLog(level, msg) {
    const now = new Date();
    const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    logEntries.push({ time, level, msg });
    if (logEntries.length > 500) logEntries.shift();
    renderLogs();
  }

  function renderLogs() {
    const filter = $('logLevel').value;
    const filtered = filter === 'all' ? logEntries : logEntries.filter(l => l.level === filter);
    const content = $('logsContent');

    content.innerHTML = filtered.map(l => `
      <div class="log-line">
        <span class="log-time">${l.time}</span>
        <span class="log-level ${l.level}">${l.level.toUpperCase()}</span>
        <span class="log-msg">${l.msg}</span>
      </div>
    `).join('');

    content.scrollTop = content.scrollHeight;
  }

  $('logLevel').addEventListener('change', renderLogs);
  $('clearLogsBtn').addEventListener('click', () => { logEntries.length = 0; renderLogs(); });
  $('scrollBottomBtn').addEventListener('click', () => { $('logsContent').scrollTop = $('logsContent').scrollHeight; });

  // Generate some initial logs
  const demoLogs = [
    ['info', 'System started successfully'],
    ['info', 'BFL backend initialized'],
    ['info', 'K3s cluster healthy - all nodes ready'],
    ['info', 'Market service connected'],
    ['info', 'Files service mounted all volumes'],
    ['info', 'SSL certificate valid, expires in 89 days'],
    ['info', 'Tailscale connected to network'],
    ['warn', 'Disk usage approaching 80% on /data'],
    ['info', 'Settings service loaded configuration'],
    ['info', 'Desktop service ready'],
    ['info', 'Monitoring metrics collection started'],
    ['info', 'GPU detection completed'],
  ];
  demoLogs.forEach(([level, msg]) => addLog(level, msg));

  // Periodically add logs
  setInterval(() => {
    const msgs = [
      ['info', 'Metrics collected successfully'],
      ['info', 'Health check passed'],
      ['info', 'Certificate renewal check: OK'],
      ['info', 'Backup completed'],
    ];
    const [level, msg] = msgs[Math.floor(Math.random() * msgs.length)];
    addLog(level, msg);
  }, 10000);

  // --- Resize handler for charts ---
  window.addEventListener('resize', () => {
    drawChart('cpuChart', cpuHistory, 'rgb(59,130,246)');
    drawChart('memChart', memHistory, 'rgb(34,197,94)');
  });

  // --- Init ---
  async function init() {
    await Promise.all([loadMetrics(), loadPods(), loadGPU()]);

    // Initial chart draw
    drawChart('cpuChart', cpuHistory, 'rgb(59,130,246)');
    drawChart('memChart', memHistory, 'rgb(34,197,94)');

    // Poll
    setInterval(loadMetrics, 5000);
    setInterval(loadPods, 15000);
  }

  init();
})();
</script>
</body>
</html>
