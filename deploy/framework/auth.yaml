---
# Empty stub for the per-app public-domain list. Created here so the
# ConfigMap exists from platform install; appservice updates its `data`
# whenever a user toggles "Public access" on/off in the Market detail
# dialog. Without this stub, the auth-backend pod's `optional: true`
# volume mount stays empty until first manual restart after the CM is
# created — see `internal/auth/publicdomainwatcher.go` for the reader
# side and `internal/appservice/publicdomains.go` for the writer.
apiVersion: v1
kind: ConfigMap
metadata:
  name: public-app-domains
  namespace: {{FRAMEWORK_NAMESPACE}}
  labels:
    app: packalares-auth
data:
  domains.txt: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: {{FRAMEWORK_NAMESPACE}}
  labels:
    app: packalares-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: packalares-auth
  template:
    metadata:
      labels:
        app: packalares-auth
    spec:
      initContainers:
      - name: wait-for-tapr
        image: ghcr.io/packalares/busybox:1.36
        command:
          - sh
          - -c
          - >-
            echo "Waiting for tapr ...";
            until wget -q -O- http://tapr-svc.{{PLATFORM_NAMESPACE}}:8080/healthz 2>/dev/null | grep -q ok; do
              sleep 2; printf ".";
            done;
            echo " tapr is ready";
      containers:
      - name: auth
        image: ghcr.io/packalares/auth:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9091
          name: http
        env:
        - name: TAPR_URL
          value: "http://tapr-svc.{{PLATFORM_NAMESPACE}}:8080"
        - name: TAPR_AUTH_TOKEN
          value: "{{TAPR_AUTH_TOKEN}}"
        - name: USER_ZONE
          value: "{{USER_ZONE}}"
        - name: REDIS_ADDR
          value: "kvrocks-svc.{{PLATFORM_NAMESPACE}}:6379"
        - name: LLDAP_HOST
          value: "lldap-svc.{{PLATFORM_NAMESPACE}}"
        - name: LLDAP_PORT
          value: "17170"
        - name: LLDAP_ADMIN_PASSWORD
          value: "{{LLDAP_ADMIN_PASSWORD}}"
        - name: TOTP_ISSUER
          value: "packalares"
        - name: AUTH_LISTEN_ADDR
          value: ":9091"
        - name: PUBLIC_DOMAINS_FILE
          value: "/etc/auth-backend/public-domains/domains.txt"
        volumeMounts:
        - name: public-domains
          mountPath: /etc/auth-backend/public-domains
          readOnly: true
        livenessProbe:
          httpGet:
            path: /api/health
            port: 9091
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/health
            port: 9091
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: public-domains
        configMap:
          name: public-app-domains
          optional: true

---
apiVersion: v1
kind: Service
metadata:
  name: auth-backend
  namespace: {{FRAMEWORK_NAMESPACE}}
spec:
  selector:
    app: packalares-auth
  type: ClusterIP
  ports:
  - protocol: TCP
    name: http
    port: 9091
    targetPort: 9091

---
# ExternalName service for cross-namespace access
apiVersion: v1
kind: Service
metadata:
  name: authelia-backend-svc
  namespace: {{USER_NAMESPACE}}
spec:
  type: ExternalName
  externalName: auth-backend.{{FRAMEWORK_NAMESPACE}}.svc.cluster.local
  ports:
  - protocol: TCP
    name: http
    port: 9091
    targetPort: 9091
