<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packalares - Market</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg-surface: #111;
  --bg-card: #141414;
  --bg-hover: #1a1a1a;
  --border: #222;
  --border-light: #2a2a2a;
  --text: #e0e0e0;
  --text-muted: #888;
  --text-dim: #555;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --danger: #ef4444;
  --success: #22c55e;
  --warning: #f59e0b;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.2s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 220px;
  min-height: 100vh;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  padding: 0;
  flex-shrink: 0;
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  overflow-y: auto;
  z-index: 100;
}

.sidebar-header {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header svg {
  width: 24px;
  height: 24px;
  color: var(--accent);
}

.sidebar-header h1 {
  font-size: 16px;
  font-weight: 600;
}

.sidebar-back {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  border-radius: 4px;
  display: flex;
  margin-right: 4px;
  transition: color var(--transition);
}

.sidebar-back:hover { color: var(--text); }
.sidebar-back svg { width: 18px; height: 18px; }

.sidebar-search {
  padding: 12px 16px;
}

.sidebar-search input {
  width: 100%;
  height: 32px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0 10px 0 30px;
  color: var(--text);
  font-size: 12px;
  transition: border-color var(--transition);
}

.sidebar-search input:focus {
  outline: none;
  border-color: var(--accent);
}

.sidebar-search {
  position: relative;
}

.sidebar-search svg {
  position: absolute;
  left: 26px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  color: var(--text-dim);
}

.sidebar-section {
  padding: 12px 0;
}

.sidebar-section-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  padding: 0 20px 8px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 20px;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
  border-left: 3px solid transparent;
}

.sidebar-item:hover {
  background: var(--bg-hover);
  color: var(--text);
}

.sidebar-item.active {
  background: rgba(59,130,246,0.08);
  color: var(--accent);
  border-left-color: var(--accent);
}

.sidebar-item svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.sidebar-item .count {
  margin-left: auto;
  font-size: 11px;
  background: var(--bg-hover);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--text-dim);
}

/* Main */
.main {
  margin-left: 220px;
  flex: 1;
  min-height: 100vh;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.header h2 {
  font-size: 18px;
  font-weight: 600;
}

.header-actions {
  margin-left: auto;
  display: flex;
  gap: 8px;
}

.view-toggle {
  display: flex;
  background: var(--bg-hover);
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.view-toggle button {
  background: none;
  border: none;
  color: var(--text-muted);
  padding: 6px 10px;
  cursor: pointer;
  display: flex;
  transition: background var(--transition), color var(--transition);
}

.view-toggle button.active {
  background: var(--accent);
  color: #fff;
}

.view-toggle button svg {
  width: 14px;
  height: 14px;
}

/* Content */
.content {
  padding: 24px 32px;
  max-width: 1200px;
}

/* Featured */
.featured-section {
  margin-bottom: 32px;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.section-title {
  font-size: 16px;
  font-weight: 600;
}

.section-link {
  font-size: 12px;
  color: var(--accent);
  cursor: pointer;
  transition: color var(--transition);
  background: none;
  border: none;
}

.section-link:hover {
  color: var(--accent-hover);
}

.featured-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

.featured-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  cursor: pointer;
  transition: border-color var(--transition), transform var(--transition);
}

.featured-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}

.featured-card-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 12px;
}

.featured-card-icon {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(59,130,246,0.1);
}

.featured-card-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.featured-card-icon svg {
  width: 28px;
  height: 28px;
  color: var(--accent);
}

.featured-card-info h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
}

.featured-card-info .category {
  font-size: 11px;
  color: var(--text-dim);
}

.featured-card-desc {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* App Grid */
.app-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.app-card {
  background: var(--bg-card);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: background var(--transition);
  border-bottom: 1px solid var(--border);
}

.app-card:hover {
  background: var(--bg-hover);
}

.app-card-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(59,130,246,0.1);
}

.app-card-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.app-card-icon svg {
  width: 24px;
  height: 24px;
  color: var(--accent);
}

.app-card-info {
  flex: 1;
  min-width: 0;
}

.app-card-info h4 {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.app-card-info .desc {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.app-card-action {
  flex-shrink: 0;
}

.install-btn {
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 500;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background var(--transition);
}

.install-btn.install {
  background: var(--accent);
  color: #fff;
}

.install-btn.install:hover {
  background: var(--accent-hover);
}

.install-btn.installed {
  background: rgba(34,197,94,0.1);
  color: var(--success);
}

.install-btn.uninstall {
  background: rgba(239,68,68,0.1);
  color: var(--danger);
}

.install-btn.installing {
  background: rgba(245,158,11,0.1);
  color: var(--warning);
  pointer-events: none;
}

/* App Detail Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-overlay.visible {
  display: flex;
  animation: fadeIn 0.2s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 90%;
  max-width: 700px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
  animation: modalIn 0.2s ease-out;
}

@keyframes modalIn {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal-header {
  padding: 24px 28px 0;
  display: flex;
  align-items: flex-start;
  gap: 18px;
}

.modal-icon {
  width: 72px;
  height: 72px;
  border-radius: 16px;
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(59,130,246,0.1);
}

.modal-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.modal-icon svg {
  width: 36px;
  height: 36px;
  color: var(--accent);
}

.modal-title-area {
  flex: 1;
}

.modal-title-area h2 {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 4px;
}

.modal-title-area .developer {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.modal-title-area .category-tag {
  display: inline-block;
  font-size: 10px;
  color: var(--accent);
  background: rgba(59,130,246,0.1);
  padding: 2px 8px;
  border-radius: 4px;
}

.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  border-radius: 4px;
  transition: color var(--transition);
}

.modal-close:hover { color: var(--text); }
.modal-close svg { width: 20px; height: 20px; }

.modal-actions {
  padding: 16px 28px;
  display: flex;
  gap: 8px;
}

.modal-btn {
  padding: 8px 24px;
  font-size: 13px;
  font-weight: 500;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background var(--transition);
}

.modal-btn.primary {
  background: var(--accent);
  color: #fff;
}

.modal-btn.primary:hover { background: var(--accent-hover); }

.modal-btn.danger {
  background: rgba(239,68,68,0.1);
  color: var(--danger);
}

.modal-btn.danger:hover {
  background: rgba(239,68,68,0.2);
}

.modal-screenshots {
  padding: 0 28px;
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 16px;
}

.modal-screenshots::-webkit-scrollbar { height: 4px; }
.modal-screenshots::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.modal-screenshot {
  width: 240px;
  height: 150px;
  border-radius: 8px;
  flex-shrink: 0;
  background: var(--bg-hover);
  overflow: hidden;
  border: 1px solid var(--border);
}

.modal-screenshot img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.modal-body {
  padding: 0 28px 24px;
}

.modal-section {
  margin-bottom: 20px;
}

.modal-section h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
}

.modal-section p {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
}

.modal-requirements {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.req-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  text-align: center;
}

.req-item .label {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.req-item .value {
  font-size: 14px;
  font-weight: 500;
}

/* Skeleton */
.skeleton {
  background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.03) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.skeleton-card {
  height: 80px;
  border-radius: var(--radius);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  z-index: 300;
  transition: transform 0.3s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}

.toast.visible {
  transform: translateX(-50%) translateY(0);
}

.toast.success { border-color: var(--success); }
.toast.error { border-color: var(--danger); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* Empty State */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}

.empty-state svg {
  width: 48px;
  height: 48px;
  margin-bottom: 16px;
  color: var(--text-dim);
}

.empty-state p {
  font-size: 14px;
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <button class="sidebar-back" onclick="window.history.back()" title="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    <h1>Market</h1>
  </div>

  <div class="sidebar-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="sidebarSearch" placeholder="Search apps..." />
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-title">Browse</div>
    <div class="sidebar-item active" data-category="all">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
      Discover
    </div>
    <div class="sidebar-item" data-category="installed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      Installed
    </div>
  </div>

  <div class="sidebar-section" id="categoriesList">
    <div class="sidebar-section-title">Categories</div>
  </div>
</div>

<!-- Main Content -->
<div class="main">
  <div class="header">
    <h2 id="pageTitle">Discover</h2>
    <div class="header-actions">
      <div class="view-toggle">
        <button class="active" id="gridViewBtn" title="Grid View">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button id="listViewBtn" title="List View">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="content" id="content">
    <!-- Featured section -->
    <div class="featured-section" id="featuredSection">
      <div class="section-header">
        <span class="section-title">Featured Apps</span>
        <button class="section-link" onclick="document.querySelector('[data-category=all]').click()">See All</button>
      </div>
      <div class="featured-grid" id="featuredGrid">
        <div class="featured-card skeleton-card"></div>
        <div class="featured-card skeleton-card"></div>
        <div class="featured-card skeleton-card"></div>
      </div>
    </div>

    <!-- All apps -->
    <div>
      <div class="section-header">
        <span class="section-title" id="appsSectionTitle">All Apps</span>
        <span id="appsCount" style="font-size:12px;color:var(--text-dim)"></span>
      </div>
      <div id="appGrid" class="app-grid">
        <div class="app-card skeleton-card"></div>
        <div class="app-card skeleton-card"></div>
        <div class="app-card skeleton-card"></div>
        <div class="app-card skeleton-card"></div>
      </div>
    </div>
  </div>
</div>

<!-- App Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-icon" id="modalIcon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
      </div>
      <div class="modal-title-area">
        <h2 id="modalTitle">App Name</h2>
        <div class="developer" id="modalDeveloper">Developer</div>
        <span class="category-tag" id="modalCategory">Category</span>
      </div>
      <button class="modal-close" id="modalClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="modal-actions" id="modalActions"></div>

    <div class="modal-screenshots" id="modalScreenshots"></div>

    <div class="modal-body">
      <div class="modal-section">
        <h3>Description</h3>
        <p id="modalDesc">Loading...</p>
      </div>
      <div class="modal-section">
        <h3>Requirements</h3>
        <div class="modal-requirements" id="modalRequirements"></div>
      </div>
      <div class="modal-section" id="modalVersionSection" style="display:none">
        <h3>Version Info</h3>
        <p id="modalVersion"></p>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // --- State ---
  const state = {
    allApps: [],
    installedApps: [],
    categories: [],
    currentCategory: 'all',
    searchQuery: '',
    selectedApp: null,
    installingApps: new Set()
  };

  // --- DOM ---
  const $ = id => document.getElementById(id);
  const featuredGrid = $('featuredGrid');
  const appGrid = $('appGrid');
  const modalOverlay = $('modalOverlay');
  const sidebarSearch = $('sidebarSearch');
  const categoriesList = $('categoriesList');
  const pageTitle = $('pageTitle');
  const appsSectionTitle = $('appsSectionTitle');
  const appsCount = $('appsCount');
  const featuredSection = $('featuredSection');
  const toast = $('toast');

  // --- Toast ---
  function showToast(msg, type = '') {
    toast.textContent = msg;
    toast.className = 'toast visible' + (type ? ' ' + type : '');
    setTimeout(() => toast.classList.remove('visible'), 3000);
  }

  // --- Default app catalog (fallback when API is not yet available) ---
  const defaultApps = [
    { name: 'wordpress', title: 'WordPress', desc: 'The world\'s most popular website builder and CMS.', icon: '', category: 'Productivity', developer: 'WordPress Foundation', version: '6.4', cpu: '0.5', memory: '512Mi', disk: '2Gi' },
    { name: 'gitea', title: 'Gitea', desc: 'Lightweight self-hosted Git service.', icon: '', category: 'Developer Tools', developer: 'Gitea', version: '1.21', cpu: '0.5', memory: '512Mi', disk: '1Gi' },

  ];

  // --- API ---
  async function loadMarketApps() {
    try {
      const res = await fetch('/market/v1/apps');
      if (res.ok) {
        const data = await res.json();
        state.allApps = Array.isArray(data) ? data : (data.items || data.apps || []);
      } else {
        throw new Error('API not available');
      }
    } catch (e) {
      console.warn('Using default app catalog:', e.message);
      state.allApps = defaultApps;
    }

    extractCategories();
    renderCategoriesSidebar();
    renderAll();
  }

  async function loadInstalledApps() {
    try {
      const res = await fetch('/server/myApps', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
      if (res.ok) {
        const data = await res.json();
        state.installedApps = Array.isArray(data) ? data.map(a => a.name) : [];
      }
    } catch (e) {
      console.warn('Failed to load installed apps:', e.message);
      state.installedApps = ['files', 'settings', 'market', 'dashboard', 'control-hub'];
    }
    renderAll();
  }

  function isInstalled(appName) {
    return state.installedApps.includes(appName);
  }

  function extractCategories() {
    const cats = new Set();
    state.allApps.forEach(app => {
      const cat = app.category || app.categories?.[0] || 'Other';
      cats.add(cat);
    });
    state.categories = Array.from(cats).sort();
  }

  // --- Render ---
  function renderCategoriesSidebar() {
    const existing = categoriesList.querySelectorAll('.sidebar-item');
    existing.forEach(el => el.remove());

    const categoryIcons = {
      'Productivity': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
      'Developer Tools': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>',
      'Entertainment': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>',
      'AI & ML': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 014 4c0 1.1-.9 2-2 2h-4a2 2 0 01-2-2 4 4 0 014-4z"/><path d="M8 8v8a4 4 0 008 0V8"/><line x1="6" y1="12" x2="18" y2="12"/></svg>',
      'Security': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
    };

    const defaultIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>';

    state.categories.forEach(cat => {
      const count = state.allApps.filter(a => (a.category || a.categories?.[0] || 'Other') === cat).length;
      const el = document.createElement('div');
      el.className = 'sidebar-item';
      el.dataset.category = cat;
      el.innerHTML = `
        ${categoryIcons[cat] || defaultIcon}
        ${cat}
        <span class="count">${count}</span>
      `;
      el.addEventListener('click', () => selectCategory(cat));
      categoriesList.appendChild(el);
    });
  }

  function selectCategory(cat) {
    state.currentCategory = cat;
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
    const el = document.querySelector(`.sidebar-item[data-category="${cat}"]`);
    if (el) el.classList.add('active');

    if (cat === 'all') {
      pageTitle.textContent = 'Discover';
      featuredSection.style.display = '';
    } else if (cat === 'installed') {
      pageTitle.textContent = 'Installed Apps';
      featuredSection.style.display = 'none';
    } else {
      pageTitle.textContent = cat;
      featuredSection.style.display = 'none';
    }

    renderAll();
  }

  function getFilteredApps() {
    let apps = state.allApps;
    const q = state.searchQuery.toLowerCase();

    if (state.currentCategory === 'installed') {
      apps = apps.filter(a => isInstalled(a.name));
    } else if (state.currentCategory !== 'all') {
      apps = apps.filter(a => (a.category || a.categories?.[0] || 'Other') === state.currentCategory);
    }

    if (q) {
      apps = apps.filter(a => {
        const title = (a.title || a.name || '').toLowerCase();
        const desc = (a.desc || a.description || '').toLowerCase();
        return title.includes(q) || desc.includes(q);
      });
    }

    return apps;
  }

  function renderAll() {
    renderFeatured();
    renderAppGrid();
  }

  function renderFeatured() {
    if (state.currentCategory !== 'all') return;

    const featured = state.allApps.slice(0, 3);
    featuredGrid.innerHTML = '';

    featured.forEach(app => {
      const el = document.createElement('div');
      el.className = 'featured-card';
      el.innerHTML = `
        <div class="featured-card-header">
          <div class="featured-card-icon">
            ${app.icon ? `<img src="${app.icon}" onerror="this.style.display='none'"/>` : ''}
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
          </div>
          <div class="featured-card-info">
            <h3>${app.title || app.name}</h3>
            <span class="category">${app.category || 'App'}</span>
          </div>
        </div>
        <div class="featured-card-desc">${app.desc || app.description || 'No description available.'}</div>
      `;
      el.addEventListener('click', () => openAppDetail(app));
      featuredGrid.appendChild(el);
    });
  }

  function renderAppGrid() {
    const apps = getFilteredApps();
    appGrid.innerHTML = '';
    appsCount.textContent = `${apps.length} apps`;

    if (apps.length === 0) {
      appGrid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>No apps found</p></div>';
      return;
    }

    apps.forEach(app => {
      const installed = isInstalled(app.name);
      const installing = state.installingApps.has(app.name);
      let btnClass = 'install';
      let btnText = 'Install';

      if (installing) {
        btnClass = 'installing';
        btnText = 'Installing...';
      } else if (installed) {
        btnClass = 'installed';
        btnText = 'Installed';
      }

      const el = document.createElement('div');
      el.className = 'app-card';
      el.innerHTML = `
        <div class="app-card-icon">
          ${app.icon ? `<img src="${app.icon}" onerror="this.style.display='none'"/>` : ''}
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
        </div>
        <div class="app-card-info">
          <h4>${app.title || app.name}</h4>
          <span class="desc">${app.desc || app.description || app.category || ''}</span>
        </div>
        <div class="app-card-action">
          <button class="install-btn ${btnClass}" data-app="${app.name}">${btnText}</button>
        </div>
      `;

      el.querySelector('.app-card-info').addEventListener('click', () => openAppDetail(app));
      el.querySelector('.app-card-icon').addEventListener('click', () => openAppDetail(app));

      const btn = el.querySelector('.install-btn');
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (installed) {
          uninstallApp(app);
        } else if (!installing) {
          installApp(app);
        }
      });

      appGrid.appendChild(el);
    });
  }

  // --- App Detail Modal ---
  function openAppDetail(app) {
    state.selectedApp = app;
    $('modalTitle').textContent = app.title || app.name;
    $('modalDeveloper').textContent = app.developer || 'Unknown Developer';
    $('modalCategory').textContent = app.category || 'App';
    $('modalDesc').textContent = app.desc || app.description || 'No description available.';

    // Icon
    const iconEl = $('modalIcon');
    if (app.icon) {
      iconEl.innerHTML = `<img src="${app.icon}" onerror="this.parentElement.innerHTML='<svg viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'2\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\'/></svg>'"/>`;
    } else {
      iconEl.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>';
    }

    // Actions
    const installed = isInstalled(app.name);
    const actionsEl = $('modalActions');
    actionsEl.innerHTML = installed
      ? `<button class="modal-btn primary" onclick="window.location.href='/'">Open</button><button class="modal-btn danger" id="modalUninstall">Uninstall</button>`
      : `<button class="modal-btn primary" id="modalInstall">Install</button>`;

    if (installed) {
      const unBtn = $('modalUninstall');
      if (unBtn) unBtn.addEventListener('click', () => { uninstallApp(app); closeModal(); });
    } else {
      const inBtn = $('modalInstall');
      if (inBtn) inBtn.addEventListener('click', () => { installApp(app); closeModal(); });
    }

    // Screenshots
    const screenshotsEl = $('modalScreenshots');
    const screenshots = app.screenshots || app.images || [];
    if (screenshots.length > 0) {
      screenshotsEl.innerHTML = screenshots.map(s => `<div class="modal-screenshot"><img src="${s}" onerror="this.parentElement.style.display='none'"/></div>`).join('');
    } else {
      screenshotsEl.innerHTML = '<div style="padding:0 0 8px;color:var(--text-dim);font-size:12px;">No screenshots available</div>';
    }

    // Requirements
    const reqEl = $('modalRequirements');
    reqEl.innerHTML = `
      <div class="req-item"><div class="label">CPU</div><div class="value">${app.cpu || 'N/A'}</div></div>
      <div class="req-item"><div class="label">Memory</div><div class="value">${app.memory || 'N/A'}</div></div>
      <div class="req-item"><div class="label">Disk</div><div class="value">${app.disk || 'N/A'}</div></div>
    `;

    // Version
    if (app.version) {
      $('modalVersionSection').style.display = '';
      $('modalVersion').textContent = `Version ${app.version}`;
    } else {
      $('modalVersionSection').style.display = 'none';
    }

    modalOverlay.classList.add('visible');
  }

  function closeModal() {
    modalOverlay.classList.remove('visible');
    state.selectedApp = null;
  }

  $('modalClose').addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // --- Install / Uninstall ---
  async function installApp(app) {
    state.installingApps.add(app.name);
    renderAll();
    showToast(`Installing ${app.title || app.name}...`);

    try {
      const res = await fetch('/api/apps/install', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: app.name })
      });

      if (res.ok) {
        state.installedApps.push(app.name);
        showToast(`${app.title || app.name} installed successfully!`, 'success');
      } else {
        throw new Error('Install failed');
      }
    } catch (e) {
      showToast(`Failed to install ${app.title || app.name}`, 'error');
    } finally {
      state.installingApps.delete(app.name);
      renderAll();
    }
  }

  async function uninstallApp(app) {
    if (!confirm(`Uninstall ${app.title || app.name}?`)) return;

    showToast(`Uninstalling ${app.title || app.name}...`);

    try {
      const res = await fetch('/api/apps/uninstall', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: app.name })
      });

      if (res.ok) {
        state.installedApps = state.installedApps.filter(n => n !== app.name);
        showToast(`${app.title || app.name} uninstalled`, 'success');
      } else {
        throw new Error('Uninstall failed');
      }
    } catch (e) {
      showToast(`Failed to uninstall ${app.title || app.name}`, 'error');
    }

    renderAll();
  }

  // --- Search ---
  sidebarSearch.addEventListener('input', () => {
    state.searchQuery = sidebarSearch.value;
    renderAll();
  });

  // --- Sidebar navigation ---
  document.querySelectorAll('.sidebar-item[data-category]').forEach(el => {
    el.addEventListener('click', () => selectCategory(el.dataset.category));
  });

  // --- Init ---
  async function init() {
    await Promise.all([loadMarketApps(), loadInstalledApps()]);
  }

  init();
})();
</script>
</body>
