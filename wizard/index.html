<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Packalares Setup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 520px; padding: 24px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 28px; font-weight: 600; color: #fff; letter-spacing: -0.5px; }
        .logo p { color: #666; margin-top: 6px; font-size: 13px; }
        .card { background: #131313; border: 1px solid #222; border-radius: 16px; padding: 28px; margin-bottom: 16px; }
        .card h2 { font-size: 17px; font-weight: 600; margin-bottom: 20px; color: #fff; display: flex; align-items: center; gap: 10px; }
        .status-item { display: flex; align-items: center; padding: 9px 0; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
        .status-item:last-child { border: none; }
        .dot { width: 7px; height: 7px; border-radius: 50%; margin-right: 12px; flex-shrink: 0; transition: all 0.4s; }
        .dot-green { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.3); }
        .dot-yellow { background: #eab308; }
        .dot-blue { background: #3b82f6; animation: pulse 1.2s ease-in-out infinite; }
        .dot-gray { background: #333; }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
        .status-name { flex: 1; color: #aaa; }
        .status-name.active { color: #e0e0e0; }
        .tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
        .tag-run { color: #4ade80; background: rgba(34,197,94,0.1); }
        .tag-wait { color: #888; background: rgba(255,255,255,0.04); }
        .tag-pull { color: #60a5fa; background: rgba(59,130,246,0.1); }
        .tag-err { color: #fca5a5; background: rgba(239,68,68,0.1); }
        .progress-wrap { margin-top: 20px; }
        .progress-bar { width: 100%; height: 3px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #22c55e); border-radius: 2px; transition: width 0.6s ease; }
        .progress-text { text-align: right; margin-top: 6px; font-size: 11px; color: #555; }
        .counter { font-size: 48px; font-weight: 700; color: #fff; text-align: center; line-height: 1; }
        .counter-label { text-align: center; font-size: 12px; color: #555; margin-top: 4px; }
        .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #444; padding: 14px 0 6px; font-weight: 600; }
        .msg { padding: 12px 14px; border-radius: 10px; margin-top: 14px; font-size: 13px; line-height: 1.5; }
        .msg-ok { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); color: #4ade80; }
        .msg-info { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); color: #93c5fd; }
        .mono { background: #0a0a0a; border: 1px solid #222; border-radius: 10px; padding: 14px; font-family: 'SF Mono',Monaco,'Fira Code',monospace; font-size: 12px; color: #93c5fd; line-height: 1.8; user-select: all; margin-top: 8px; word-break: break-all; }
        .hidden { display: none; }
        .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid #333; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.5s linear infinite; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg) } }
        a { color: #3b82f6; text-decoration: none; }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
        .btn { display: block; width: 100%; padding: 13px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; background: #3b82f6; color: #fff; transition: all 0.2s; }
        .btn:hover { background: #2563eb; }
        .hint { font-size: 11px; color: #444; margin-top: 6px; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <h1>Packalares</h1>
        <p>Self-hosted personal cloud OS</p>
    </div>

    <!-- Installing -->
    <div id="view-install">
        <div class="card">
            <h2><span class="spin"></span> Installing</h2>
            <div class="counter" id="count-run">0</div>
            <div class="counter-label"><span id="count-total">0</span> services</div>
            <div class="progress-wrap">
                <div class="progress-bar"><div class="progress-fill" id="bar" style="width:0%"></div></div>
                <div class="progress-text" id="bar-text">Starting...</div>
            </div>
        </div>
        <div class="card">
            <div class="section-label">Platform</div>
            <div id="g-platform"></div>
            <div class="section-label">Services</div>
            <div id="g-framework"></div>
            <div class="section-label">User</div>
            <div id="g-user"></div>
        </div>
    </div>

    <!-- Ready -->
    <div id="view-done" class="hidden fade-in">
        <div class="card">
            <h2 style="color:#22c55e">System Ready</h2>
            <div class="msg msg-ok">Your personal cloud is running.</div>

            <div style="margin-top:20px">
                <label style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:0.5px">Hosts File</label>
                <div class="mono" id="hosts-box"></div>
                <div class="hint">Add this to <code>/etc/hosts</code> (Linux/Mac) or <code>C:\Windows\System32\drivers\etc\hosts</code> (Windows)</div>
            </div>

            <div style="margin-top:24px">
                <a id="link-desktop" href="#" target="_blank" class="btn">Open Desktop →</a>
            </div>
            <div style="margin-top:10px;text-align:center;font-size:13px;color:#666">
                Login: <strong style="color:#fff" id="done-user"></strong>
            </div>
        </div>
    </div>
</div>

<script>
const SVC = {
    platform: {
        'citus':'Database', 'kvrocks':'Cache', 'nats':'Messaging', 'lldap':'Directory',
        'opa':'Policy', 'tapr-middleware':'Middleware', 'tapr-s3':'Storage',
        'argo':'Workflows', 'workflow-controller':'Scheduler', 'kubeblocks':'DB Operator'
    },
    framework: {
        'authelia-backend':'Auth', 'app-service':'Apps', 'files':'Files',
        'seafile':'Sync', 'market':'Market', 'backup':'Backup',
        'download':'Downloads', 'image-service':'Images', 'monitoring':'Monitor',
        'system-provider':'System', 'chartrepo':'Charts', 'infisical':'Secrets',
        'tapr-sysevent':'Events', 'velero':'Backup Engine'
    },
    user: {
        'bfl':'Gateway', 'olares-app':'Desktop', 'authelia-deployment':'Auth Proxy', 'wizard':'Wizard'
    }
};

let info = {};

function row(label, phase) {
    let dc='dot-gray', tc='tag-wait', tt='Waiting';
    if (phase==='Running') { dc='dot-green'; tc='tag-run'; tt='Ready'; }
    else if (phase==='Pending') { dc='dot-yellow'; tc='tag-wait'; tt='Starting'; }
    else if (phase==='Pulling') { dc='dot-blue'; tc='tag-pull'; tt='Pulling'; }
    else if (phase==='Error') { dc='dot-gray'; tc='tag-err'; tt='Error'; }
    return `<div class="status-item"><div class="dot ${dc}"></div><span class="status-name${phase==='Running'?' active':''}">${label}</span><span class="tag ${tc}">${tt}</span></div>`;
}

function render(id, map, up) {
    document.getElementById(id).innerHTML = Object.entries(map).map(([k,v]) =>
        row(v, up ? 'Running' : (k==='wizard' ? 'Running' : null))
    ).join('');
}

async function poll() {
    let bflUp = false;
    try {
        const r = await fetch('/bfl/backend/v1/user-info');
        const d = await r.json();
        if (d.code===0) { bflUp=true; info=d.data; }
    } catch(e) {}

    render('g-platform', SVC.platform, bflUp);
    render('g-framework', SVC.framework, bflUp);
    render('g-user', SVC.user, bflUp);

    const total = Object.keys(SVC.platform).length + Object.keys(SVC.framework).length + Object.keys(SVC.user).length;
    const running = bflUp ? total : 1;
    document.getElementById('count-run').textContent = running;
    document.getElementById('count-total').textContent = total;
    const pct = Math.round(running/total*100);
    document.getElementById('bar').style.width = pct+'%';
    document.getElementById('bar-text').textContent = running===total ? 'All services ready' : running+' / '+total;

    if (bflUp) {
        document.querySelector('#view-install h2').innerHTML = '✓ Installed';
        setTimeout(showDone, 2000);
        return;
    }
    setTimeout(poll, 3000);
}

function showDone() {
    document.getElementById('view-install').classList.add('hidden');
    document.getElementById('view-done').classList.remove('hidden');

    const zone = info.terminusName ? info.terminusName.replace('@','.') : 'laurs.olares.local';
    const ip = window.location.hostname;

    document.getElementById('hosts-box').textContent =
        ip+'  desktop.'+zone+'  auth.'+zone+'  settings.'+zone+'  market.'+zone+'  files.'+zone+'  '+zone;
    document.getElementById('link-desktop').href = 'https://desktop.'+zone;
    document.getElementById('done-user').textContent = info.name || 'laurs';
}

poll();
</script>
</body>
</html>
