<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packalares - Desktop</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --card-bg: rgba(30,30,30,0.85);
  --card-hover: rgba(50,50,50,0.9);
  --text: #e0e0e0;
  --text-muted: #888;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --danger: #ef4444;
  --success: #22c55e;
  --warning: #f59e0b;
  --radius: 8px;
  --radius-lg: 12px;
  --dock-bg: rgba(30,30,30,0.75);
  --topbar-bg: rgba(10,10,10,0.6);
  --window-bg: rgba(20,20,20,0.95);
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --transition: 0.2s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* Background */
.desktop-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 30%, #0f172a 60%, #1a1a2e 100%);
  background-size: cover;
}

.desktop-bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Top Bar */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 32px;
  background: var(--topbar-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 1000;
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.topbar-logo {
  font-weight: 700;
  font-size: 13px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}

.topbar-logo svg {
  width: 16px;
  height: 16px;
}

.topbar-center {
  flex: 1;
  display: flex;
  justify-content: center;
}

.topbar-search {
  width: 240px;
  height: 22px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  padding: 0 8px;
  color: var(--text-muted);
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  transition: background 0.2s;
}

.topbar-search:hover {
  background: rgba(255,255,255,0.12);
}

.topbar-search input {
  flex: 1;
  background: none;
  border: none;
  color: #fff;
  font-size: 11px;
  outline: none;
}

.topbar-search input::placeholder {
  color: var(--text-muted);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.topbar-time {
  color: rgba(255,255,255,0.7);
  font-size: 12px;
  font-weight: 500;
}

.topbar-icon {
  cursor: pointer;
  color: rgba(255,255,255,0.6);
  display: flex;
  align-items: center;
  padding: 2px;
  border-radius: 4px;
  transition: color 0.2s, background 0.2s;
}

.topbar-icon:hover {
  color: #fff;
  background: rgba(255,255,255,0.1);
}

.topbar-icon svg {
  width: 14px;
  height: 14px;
}

.topbar-avatar {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  overflow: hidden;
}

.topbar-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Desktop Grid */
.desktop-area {
  position: fixed;
  top: 32px;
  left: 0;
  right: 0;
  bottom: 68px;
  z-index: 1;
  padding: 40px 60px;
  display: grid;
  grid-template-columns: repeat(auto-fill, 90px);
  grid-template-rows: repeat(auto-fill, 100px);
  gap: 10px 20px;
  align-content: start;
}

.desktop-app {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 8px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.15s;
  text-decoration: none;
}

.desktop-app:hover {
  background: rgba(255,255,255,0.08);
}

.desktop-app:active {
  background: rgba(255,255,255,0.12);
  transform: scale(0.95);
}

.desktop-app-icon {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  background: rgba(59,130,246,0.15);
  color: var(--accent);
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.desktop-app-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 14px;
}

.desktop-app-icon.files { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: #fff; }
.desktop-app-icon.settings { background: linear-gradient(135deg, #6b7280, #374151); color: #fff; }
.desktop-app-icon.market { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: #fff; }
.desktop-app-icon.dashboard { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }
.desktop-app-icon.control-hub { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
.desktop-app-icon.app { background: linear-gradient(135deg, #06b6d4, #0891b2); color: #fff; }

.desktop-app-name {
  font-size: 11px;
  color: #fff;
  text-align: center;
  max-width: 80px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
}

/* Loading skeleton */
.skeleton {
  background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 14px;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Dock */
.dock {
  position: fixed;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  background: var(--dock-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.dock-item {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s;
  position: relative;
}

.dock-item:hover {
  transform: scale(1.2) translateY(-4px);
}

.dock-item:active {
  transform: scale(1.1) translateY(-2px);
}

.dock-item img {
  width: 36px;
  height: 36px;
  border-radius: 8px;
}

.dock-item .dock-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.dock-item .dock-dot {
  position: absolute;
  bottom: -2px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,0.6);
}

.dock-separator {
  width: 1px;
  height: 32px;
  background: rgba(255,255,255,0.15);
  margin: 0 4px;
}

.dock-tooltip {
  position: absolute;
  top: -32px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(30,30,30,0.95);
  color: #fff;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 6px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  border: 1px solid rgba(255,255,255,0.1);
}

.dock-item:hover .dock-tooltip {
  opacity: 1;
}

/* Context Menu */
.context-menu {
  position: fixed;
  z-index: 2000;
  background: rgba(30,30,30,0.95);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 4px;
  min-width: 180px;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

.context-menu.visible {
  display: block;
  animation: menuIn 0.15s ease-out;
}

@keyframes menuIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

.context-menu-item {
  padding: 6px 12px;
  font-size: 12px;
  color: var(--text);
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.1s;
}

.context-menu-item:hover {
  background: rgba(59,130,246,0.2);
}

.context-menu-item svg {
  width: 14px;
  height: 14px;
  color: var(--text-muted);
}

.context-menu-separator {
  height: 1px;
  background: rgba(255,255,255,0.08);
  margin: 4px 0;
}

/* Windows */
.app-window {
  position: fixed;
  z-index: 500;
  background: var(--window-bg);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  min-width: 400px;
  min-height: 300px;
  resize: both;
}

.app-window.maximized {
  top: 32px !important;
  left: 0 !important;
  right: 0 !important;
  bottom: 68px !important;
  width: auto !important;
  height: auto !important;
  border-radius: 0;
  resize: none;
}

.app-window.minimized {
  display: none;
}

.window-titlebar {
  height: 36px;
  background: rgba(20,20,20,0.95);
  display: flex;
  align-items: center;
  padding: 0 12px;
  cursor: move;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.window-title {
  flex: 1;
  font-size: 12px;
  font-weight: 500;
  color: rgba(255,255,255,0.8);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.window-controls {
  display: flex;
  gap: 8px;
}

.window-btn {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  transition: filter 0.15s;
}

.window-btn:hover { filter: brightness(1.2); }
.window-btn.close { background: #ef4444; }
.window-btn.minimize { background: #f59e0b; }
.window-btn.maximize { background: #22c55e; }

.window-content {
  flex: 1;
  overflow: hidden;
}

.window-content iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Launchpad Overlay */
.launchpad-overlay {
  position: fixed;
  inset: 0;
  z-index: 900;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  display: none;
  flex-direction: column;
  align-items: center;
  padding-top: 60px;
}

.launchpad-overlay.visible {
  display: flex;
  animation: fadeIn 0.3s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.launchpad-search {
  width: 300px;
  height: 36px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 0 12px;
  color: #fff;
  font-size: 14px;
  margin-bottom: 40px;
}

.launchpad-search::placeholder {
  color: rgba(255,255,255,0.4);
}

.launchpad-search:focus {
  outline: none;
  border-color: rgba(255,255,255,0.2);
}

.launchpad-grid {
  display: grid;
  grid-template-columns: repeat(7, 100px);
  gap: 20px 30px;
  max-height: calc(100vh - 200px);
  overflow-y: auto;
  padding: 0 40px 40px;
}

.launchpad-grid::-webkit-scrollbar { width: 4px; }
.launchpad-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

/* Notification panel */
.notification-panel {
  position: fixed;
  top: 32px;
  right: 0;
  width: 320px;
  max-height: calc(100vh - 100px);
  background: rgba(30,30,30,0.95);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 0 0 0 12px;
  z-index: 1500;
  display: none;
  flex-direction: column;
  overflow: hidden;
}

.notification-panel.visible {
  display: flex;
  animation: slideIn 0.2s ease-out;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.notification-header {
  padding: 12px 16px;
  font-size: 14px;
  font-weight: 600;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.notification-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.notification-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
}

.notification-item:hover {
  background: rgba(255,255,255,0.06);
}

.notification-item-title {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 4px;
}

.notification-item-desc {
  font-size: 11px;
  color: var(--text-muted);
}

.notification-item-time {
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  margin-top: 4px;
}

.notification-empty {
  padding: 40px 16px;
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
}

/* Toast */
.toast {
  position: fixed;
  top: 44px;
  left: 50%;
  transform: translateX(-50%) translateY(-60px);
  background: rgba(30,30,30,0.95);
  backdrop-filter: blur(10px);
  color: #fff;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  z-index: 3000;
  border: 1px solid rgba(255,255,255,0.08);
  transition: transform 0.3s ease;
  white-space: nowrap;
}

.toast.visible {
  transform: translateX(-50%) translateY(0);
}
</style>
</head>

<!-- Background -->

<!-- Top Bar -->

<!-- Context Menu -->

<!-- Toast -->

<!-- Windows Container -->

    { id: 'settings', name: 'settings', title: 'Settings', icon: 'settings', url: '/settings/', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>' },
    { id: 'market', name: 'market', title: 'Market', icon: 'market', url: '/market/', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>' },
    { id: 'dashboard', name: 'dashboard', title: 'Dashboard', icon: 'dashboard', url: '/dashboard/', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>' },
    { id: 'control-hub', name: 'control-hub', title: 'Control Hub', icon: 'control-hub', url: '/dashboard/', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>' }
  ];

  // --- Toast ---
  function showToast(msg, duration = 3000) {
    toast.textContent = msg;
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), duration);
  }

  // --- Clock ---
  function updateClock() {
    const now = new Date();
    topbarTime.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // --- User Info ---
  async function loadUserInfo() {
    try {
      const res = await fetch('/bfl/backend/v1/user-info');
      if (res.ok) {
        state.userInfo = await res.json();
        const name = state.userInfo.username || state.userInfo.name || 'U';
        topbarAvatar.textContent = name.charAt(0).toUpperCase();
      }
    } catch (e) {
      console.error('Failed to load user info:', e);
    }
  }

  // --- Apps ---
  async function loadApps() {
    try {
      const res = await fetch('/server/myApps', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
      if (res.ok) {
        const data = await res.json();
        state.apps = data.filter(app => app.state !== 'uninstalling' && app.state !== 'uninstalled');
      }
    } catch (e) {
      console.error('Failed to load apps:', e);
    }
    renderDesktop();
  }

  function getAllApps() {
    const merged = [...systemApps];
    for (const app of state.apps) {
      if (!systemApps.find(s => s.name === app.name)) {
        const entrance = app.entrances && app.entrances[0];
        merged.push({
          id: app.id || app.name,
          name: app.name,
          title: app.title || app.name,
          icon: 'app',
          url: entrance ? entrance.url || '' : '',
          imgIcon: app.icon,
          svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>'
        });
      }
    }
    return merged;
  }

  function renderDesktop() {
    const apps = getAllApps();
    desktopArea.innerHTML = '';

    apps.forEach(app => {
      const el = document.createElement('div');
      el.className = 'desktop-app';
      el.setAttribute('data-app', app.id);
      el.innerHTML = `
        <div class="desktop-app-icon ${app.icon}">
          ${app.imgIcon ? `<img src="${app.imgIcon}" onerror="this.parentElement.innerHTML='${app.svg}'"/>` : app.svg}
        </div>
        <span class="desktop-app-name">${app.title}</span>
      `;
      el.addEventListener('dblclick', () => openApp(app));
      el.addEventListener('click', (e) => {
        // Single click: select
        document.querySelectorAll('.desktop-app.selected').forEach(s => s.classList.remove('selected'));
        el.style.background = 'rgba(59,130,246,0.15)';
        setTimeout(() => { el.style.background = ''; }, 300);
      });
      desktopArea.appendChild(el);
    });

    renderDock(apps);
    renderLaunchpad(apps);
  }

  function renderDock(apps) {
    const dockApps = ['files', 'settings', 'market', 'dashboard'];
    dock.innerHTML = '';

    dockApps.forEach(appId => {
      const app = apps.find(a => a.id === appId || a.name === appId);
      if (!app) return;

      const el = document.createElement('div');
      el.className = 'dock-item';
      el.innerHTML = `
        <div class="dock-icon ${app.icon}">
          ${app.imgIcon ? `<img src="${app.imgIcon}" style="width:36px;height:36px;border-radius:8px" onerror="this.parentElement.innerHTML='${app.svg}'"/>` : app.svg}
        </div>
        <div class="dock-tooltip">${app.title}</div>
      `;
      el.addEventListener('click', () => openApp(app));
      dock.appendChild(el);
    });

    // Launchpad button
    const sep = document.createElement('div');
    sep.className = 'dock-separator';
    dock.appendChild(sep);

    const lpBtn = document.createElement('div');
    lpBtn.className = 'dock-item';
    lpBtn.innerHTML = `
      <div class="dock-icon" style="background:rgba(255,255,255,0.1);border-radius:8px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </div>
      <div class="dock-tooltip">Launchpad</div>
    `;
    lpBtn.addEventListener('click', toggleLaunchpad);
    dock.appendChild(lpBtn);
  }

  function renderLaunchpad(apps) {
    launchpadGrid.innerHTML = '';
    apps.forEach(app => {
      const el = document.createElement('div');
      el.className = 'desktop-app';
      el.innerHTML = `
        <div class="desktop-app-icon ${app.icon}">
          ${app.imgIcon ? `<img src="${app.imgIcon}" onerror="this.parentElement.innerHTML='${app.svg}'"/>` : app.svg}
        </div>
        <span class="desktop-app-name">${app.title}</span>
      `;
      el.addEventListener('click', () => {
        openApp(app);
        closeLaunchpad();
      });
      launchpadGrid.appendChild(el);
    });
  }

  // --- Launchpad ---
  function toggleLaunchpad() {
    launchpadOverlay.classList.toggle('visible');
    if (launchpadOverlay.classList.contains('visible')) {
      launchpadSearch.value = '';
      launchpadSearch.focus();
    }
  }

  function closeLaunchpad() {
    launchpadOverlay.classList.remove('visible');
  }

  launchpadOverlay.addEventListener('click', (e) => {
    if (e.target === launchpadOverlay) closeLaunchpad();
  });

  launchpadSearch.addEventListener('input', () => {
    const q = launchpadSearch.value.toLowerCase();
    const items = launchpadGrid.querySelectorAll('.desktop-app');
    items.forEach(item => {
      const name = item.querySelector('.desktop-app-name').textContent.toLowerCase();
      item.style.display = name.includes(q) ? '' : 'none';
    });
  });

  // --- Search ---
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase();
    if (!q) {
      closeLaunchpad();
      return;
    }
    if (!launchpadOverlay.classList.contains('visible')) {
      toggleLaunchpad();
    }
    launchpadSearch.value = q;
    launchpadSearch.dispatchEvent(new Event('input'));
  });

  // --- Windows ---
  let windowCounter = 0;

  function openApp(app) {
    // Check if already open
    const existing = state.windows.find(w => w.appId === app.id && !w.el.classList.contains('minimized'));
    if (existing) {
      bringToFront(existing.el);
      return;
    }

    const minimized = state.windows.find(w => w.appId === app.id && w.el.classList.contains('minimized'));
    if (minimized) {
      minimized.el.classList.remove('minimized');
      bringToFront(minimized.el);
      return;
    }

    windowCounter++;
    const winId = 'win-' + windowCounter;
    const offset = (windowCounter % 8) * 30;

    const win = document.createElement('div');
    win.className = 'app-window';
    win.id = winId;
    win.style.top = (80 + offset) + 'px';
    win.style.left = (100 + offset) + 'px';
    win.style.width = '900px';
    win.style.height = '600px';
    win.style.zIndex = ++state.windowZIndex;

    // Determine content URL
    let contentUrl = app.url;
    if (contentUrl && !contentUrl.startsWith('http') && !contentUrl.startsWith('/')) {
      contentUrl = '/' + contentUrl;
    }

    win.innerHTML = `
      <div class="window-titlebar" data-win="${winId}">
        <span class="window-title">${app.title}</span>
        <div class="window-controls">
          <button class="window-btn minimize" data-action="minimize" title="Minimize"></button>
          <button class="window-btn maximize" data-action="maximize" title="Maximize"></button>
          <button class="window-btn close" data-action="close" title="Close"></button>
        </div>
      </div>
      <div class="window-content">
        ${contentUrl ? `<iframe src="${contentUrl}" title="${app.title}"></iframe>` : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);">Loading ${app.title}...</div>`}
      </div>
    `;

    windowsContainer.appendChild(win);

    state.windows.push({ id: winId, appId: app.id, el: win });

    // Window controls
    win.querySelector('.window-btn.close').addEventListener('click', () => closeWindow(winId));
    win.querySelector('.window-btn.minimize').addEventListener('click', () => minimizeWindow(winId));
    win.querySelector('.window-btn.maximize').addEventListener('click', () => toggleMaximize(winId));

    // Drag
    const titlebar = win.querySelector('.window-titlebar');
    titlebar.addEventListener('mousedown', startDrag);
    titlebar.addEventListener('dblclick', () => toggleMaximize(winId));

    // Focus on click
    win.addEventListener('mousedown', () => bringToFront(win));
  }

  function closeWindow(winId) {
    const idx = state.windows.findIndex(w => w.id === winId);
    if (idx !== -1) {
      state.windows[idx].el.remove();
      state.windows.splice(idx, 1);
    }
  }

  function minimizeWindow(winId) {
    const w = state.windows.find(w => w.id === winId);
    if (w) w.el.classList.add('minimized');
  }

  function toggleMaximize(winId) {
    const w = state.windows.find(w => w.id === winId);
    if (w) w.el.classList.toggle('maximized');
  }

  function bringToFront(el) {
    el.style.zIndex = ++state.windowZIndex;
  }

  // --- Dragging ---
  function startDrag(e) {
    if (e.target.classList.contains('window-btn')) return;
    const win = e.currentTarget.closest('.app-window');
    if (win.classList.contains('maximized')) return;

    state.dragWindow = win;
    const rect = win.getBoundingClientRect();
    state.dragOffset = { x: e.clientX - rect.left, y: e.clientY - rect.top };

    bringToFront(win);
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', stopDrag);
  }

  function onDrag(e) {
    if (!state.dragWindow) return;
    const x = e.clientX - state.dragOffset.x;
    const y = e.clientY - state.dragOffset.y;
    state.dragWindow.style.left = Math.max(0, x) + 'px';
    state.dragWindow.style.top = Math.max(32, y) + 'px';
  }

  function stopDrag() {
    state.dragWindow = null;
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', stopDrag);
  }

  // --- Context Menu ---
  document.addEventListener('contextmenu', (e) => {
    // Only show on desktop area or background
    if (e.target.closest('.app-window') || e.target.closest('.dock') || e.target.closest('.topbar')) return;

    e.preventDefault();
    contextMenu.style.left = e.clientX + 'px';
    contextMenu.style.top = e.clientY + 'px';
    contextMenu.classList.add('visible');
  });

  document.addEventListener('click', () => {
    contextMenu.classList.remove('visible');
    if (!notificationPanel.contains(event.target) && event.target.id !== 'notificationBtn' && !event.target.closest('#notificationBtn')) {
      notificationPanel.classList.remove('visible');
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      contextMenu.classList.remove('visible');
      closeLaunchpad();
      notificationPanel.classList.remove('visible');
    }
  });

  contextMenu.querySelectorAll('.context-menu-item').forEach(item => {
    item.addEventListener('click', () => {
      const action = item.dataset.action;
      if (action === 'refresh') {
        loadApps();
        showToast('Refreshing...');
      } else if (action === 'settings') {
        const app = systemApps.find(a => a.id === 'settings');
        if (app) openApp(app);
      } else if (action === 'appearance') {
        const app = systemApps.find(a => a.id === 'settings');
        if (app) openApp(app);
      } else if (action === 'about') {
        showToast('Packalares - Self-hosted OS');
      }
    });
  });

  // --- Notifications ---
  $('notificationBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    notificationPanel.classList.toggle('visible');
  });

  // --- Metrics polling ---
  async function loadMetrics() {
    try {
      const res = await fetch('/api/metrics');
      if (res.ok) {
        // Metrics loaded, could show in status bar
      }
    } catch (e) { /* ignore */ }
  }

  // --- Init ---
  async function init() {
    await Promise.all([loadUserInfo(), loadApps()]);
    loadMetrics();

    // Poll for app updates
    setInterval(loadApps, 30000);
    setInterval(loadMetrics, 10000);
  }

  init();
})();
</script>
</body>
</html>
