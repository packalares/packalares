---
# Combined system apps deployment
# This includes the base set of Olares-compatible system applications
# that are deployed into the user namespace during installation.
apiVersion: v1
kind: ConfigMap
metadata:
  name: olares-system-apps
  namespace: user-space-${USERNAME}
  labels:
    app: olares-system-apps
data:
  apps.yaml: |
    # System apps that are auto-installed:
    # - Desktop (web shell / launcher)
    # - Wizard (setup/activation flow)
    # - Files (file manager)
    # - Settings (system settings UI)
    # - App Store (market client)
    system_apps:
      - name: desktop
        chart: desktop
      - name: wizard
        chart: wizard
      - name: files
        chart: files-frontend
      - name: settings
        chart: settings-frontend
      - name: appstore
        chart: appstore-frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: settings-frontend
  namespace: user-space-${USERNAME}
  labels:
    app: settings-frontend
    tier: user-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: settings-frontend
  template:
    metadata:
      labels:
        app: settings-frontend
    spec:
      containers:
      - name: settings
        image: ${REGISTRY:-docker.io}/beclab/settings-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 20m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: settings-frontend-svc
  namespace: user-space-${USERNAME}
spec:
  selector:
    app: settings-frontend
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: files-frontend
  namespace: user-space-${USERNAME}
  labels:
    app: files-frontend
    tier: user-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: files-frontend
  template:
    metadata:
      labels:
        app: files-frontend
    spec:
      containers:
      - name: files
        image: ${REGISTRY:-docker.io}/beclab/files-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 20m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: files-frontend-svc
  namespace: user-space-${USERNAME}
spec:
  selector:
    app: files-frontend
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appstore-frontend
  namespace: user-space-${USERNAME}
  labels:
    app: appstore-frontend
    tier: user-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appstore-frontend
  template:
    metadata:
      labels:
        app: appstore-frontend
    spec:
      containers:
      - name: appstore
        image: ${REGISTRY:-docker.io}/beclab/appstore-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 20m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: appstore-frontend-svc
  namespace: user-space-${USERNAME}
spec:
  selector:
    app: appstore-frontend
  ports:
  - port: 80
    targetPort: 80
