---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: samba-server
  namespace: {{FRAMEWORK_NAMESPACE}}
  labels:
    app: samba-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: samba-server
  template:
    metadata:
      labels:
        app: samba-server
    spec:
      containers:
      - name: samba-server
        image: ghcr.io/packalares/samba:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 445
          name: smb
        - containerPort: 139
          name: netbios
        env:
        - name: SAMBA_USER
          valueFrom:
            secretKeyRef:
              name: samba-credentials
              key: username
              optional: true
        - name: SAMBA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: samba-credentials
              key: password
              optional: true
        - name: DATA_PATH
          value: /packalares/data
        - name: LLDAP_URL
          value: http://lldap-svc.{{PLATFORM_NAMESPACE}}:17170
        volumeMounts:
        - name: data
          mountPath: /packalares/data
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: data
        hostPath:
          path: /packalares/data
          type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: samba-server
  namespace: {{FRAMEWORK_NAMESPACE}}
spec:
  selector:
    app: samba-server
  type: NodePort
  ports:
  - protocol: TCP
    name: smb
    port: 445
    targetPort: 445
    nodePort: 30445
  - protocol: TCP
    name: netbios
    port: 139
    targetPort: 139
    nodePort: 30139

---
apiVersion: v1
kind: Secret
metadata:
  name: samba-credentials
  namespace: {{FRAMEWORK_NAMESPACE}}
type: Opaque
stringData:
  username: packalares
  password: changeme
