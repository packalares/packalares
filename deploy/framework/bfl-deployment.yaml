apiVersion: v1
kind: ServiceAccount
metadata:
  name: bfl
  namespace: "{{FRAMEWORK_NAMESPACE}}"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: packalares-bfl
rules:
  - apiGroups: ["iam.kubesphere.io"]
    resources: ["users", "globalrolebindings"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["app.{{API_GROUP}}"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "delete", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "list", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: packalares-bfl
subjects:
  - kind: ServiceAccount
    name: bfl
    namespace: "{{FRAMEWORK_NAMESPACE}}"
roleRef:
  kind: ClusterRole
  name: packalares-bfl
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bfl
  namespace: "{{FRAMEWORK_NAMESPACE}}"
  labels:
    app: bfl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bfl
  template:
    metadata:
      labels:
        app: bfl
    spec:
      serviceAccountName: bfl
      priorityClassName: system-cluster-critical
      initContainers:
        - name: wait-for-tapr
          image: ghcr.io/packalares/busybox:1.36
          command:
            - sh
            - -c
            - >-
              echo "Waiting for tapr ...";
              until wget -q -O- http://tapr-svc.{{PLATFORM_NAMESPACE}}:8080/healthz 2>/dev/null | grep -q ok; do
                sleep 2; printf ".";
              done;
              echo " tapr is ready";
      containers:
        - name: bfl
          image: ghcr.io/packalares/bfl:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: BFL_LISTEN_ADDR
              value: ":8080"
            - name: OWNER
              value: "{{USERNAME}}"
            - name: BFL_NAMESPACE
              value: "{{FRAMEWORK_NAMESPACE}}"
            - name: OLARES_DOMAIN
              value: "{{DOMAIN}}"
            - name: OLARES_LOCAL_DOMAIN
              value: "{{DOMAIN}}"
            - name: LLDAP_HOST
              value: "lldap-svc.{{PLATFORM_NAMESPACE}}"
            - name: LLDAP_ADMIN_PASSWORD
              value: "{{LLDAP_ADMIN_PASSWORD}}"
            - name: TAPR_URL
              value: "http://tapr-svc.{{PLATFORM_NAMESPACE}}:8080"
            - name: TAPR_AUTH_TOKEN
              value: "{{TAPR_AUTH_TOKEN}}"
            - name: HOSTCTL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hostctl-secret
                  key: token
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: bfl
  namespace: "{{FRAMEWORK_NAMESPACE}}"
  labels:
    app: bfl
spec:
  selector:
    app: bfl
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
  type: ClusterIP
