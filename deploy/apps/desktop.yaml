---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: desktop
  namespace: {{USER_NAMESPACE}}
  labels:
    app: desktop
    tier: user-app
    {{API_GROUP}}/owner: "{{USERNAME}}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: desktop
  template:
    metadata:
      labels:
        app: desktop
    spec:
      containers:
      - name: desktop
        image: ghcr.io/packalares/desktop:latest
        ports:
        - containerPort: 80
          name: http
        env:
        - name: USER_ZONE
          value: "{{USER_ZONE}}"
        - name: DOMAIN
          value: "{{DOMAIN}}"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: desktop-svc
  namespace: {{USER_NAMESPACE}}
spec:
  selector:
    app: desktop
  ports:
  - port: 80
    targetPort: 80
