server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets
    location /js/ { try_files $uri =404; }
    location /css/ { try_files $uri =404; }
    location /fonts/ { try_files $uri =404; }
    location /icons/ { try_files $uri =404; }

    # Root redirect
    location = / {
        return 302 /desktop;
    }

    # SPA fallback — all routes handled by Vue Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
