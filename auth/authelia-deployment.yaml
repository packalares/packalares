###############################################################
# Authelia — Authentication server (stock upstream)
# Deployed in namespace: packalares-auth
#
# Forward-auth endpoint: authelia-svc.packalares-auth:9091
# Login page: https://auth.USER_ZONE/
###############################################################
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authelia-data
  namespace: packalares-auth
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
  namespace: packalares-auth
# data populated by setup-auth.sh from authelia-config.yaml.tmpl
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authelia
  namespace: packalares-auth
  labels:
    app: authelia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authelia
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: authelia
    spec:
      containers:
        - name: authelia
          image: authelia/authelia:4.38
          ports:
            - containerPort: 9091
              name: http
          args:
            - --config=/etc/authelia/configuration.yml
          volumeMounts:
            - name: config
              mountPath: /etc/authelia/configuration.yml
              subPath: configuration.yml
              readOnly: true
            - name: data
              mountPath: /data
          env:
            - name: TZ
              value: "UTC"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: authelia-config
        - name: data
          persistentVolumeClaim:
            claimName: authelia-data
---
apiVersion: v1
kind: Service
metadata:
  name: authelia-svc
  namespace: packalares-auth
  labels:
    app: authelia
spec:
  selector:
    app: authelia
  ports:
    - name: http
      port: 9091
      targetPort: 9091
